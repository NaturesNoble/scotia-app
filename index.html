      </div>
    </td></tr>
  </table>
</div>
` : ""}

</div>
</body></html>
  `;

  const win = window.open("", "_blank");
  if(!win){ toast("Pop-up blocked — allow pop-ups and try again", "fail"); return; }
  win.document.open();
  win.document.write(html);
  win.document.close();
  toast("PDF ready — use the Print button at the top, choose 'Save as PDF'", "pass");
}

/* ============================================================
   Share-the-report — uses Web Share API (mobile) with file attachment
   where supported, otherwise falls back to a mailto: link.
============================================================ */
async function shareRecordViaEmail(recordId){
  const records = loadRecords();
  const r = records.find(x => x.id === recordId);
  if(!r){ toast("Record not found", "fail"); return; }

  toast("Preparing report…", "info");
  // Generate the Excel blob the same way the export does
  try {
    const blob = await buildRecordXLSXBlob(r);
    const file = new File([blob], `Scotia_${(r.assetId || "report").replace(/[^a-z0-9_-]/gi,"_")}_${(r.inspDate||"").replace(/[^0-9-]/g,"")}.xlsx`,
      { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    const subject = `Scotia Inspection Report — ${r.reportNumber || r.assetId || r.itemName}`;
    const body = `Please find attached the inspection report for:\n\nAsset / Part: ${r.assetId || "N/A"}\nItem: ${r.itemName}\nInspection date: ${formatDateAU(r.inspDate)}\nStatus: ${r.status}${r.statusReason ? ` (${r.statusReason})` : ""}\nInspector: ${r.inspectorName || "N/A"}\n\nReport generated by Scotia Inspection app.`;

    // Try Web Share API first (best on mobile)
    if(navigator.canShare && navigator.canShare({ files: [file] })){
      try {
        await navigator.share({ files: [file], title: subject, text: body });
        toast("Shared", "pass");
        return;
      } catch(err){
        if(err.name === "AbortError") return;  // user cancelled
        // Fall through to mailto fallback
      }
    }

    // Fallback: download the file + open mailto so the user attaches manually
    downloadBlob(blob, file.name);
    const mailto = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body + "\n\n(The report file has been downloaded — attach it from your Downloads folder.)")}`;
    window.location.href = mailto;
    toast("Report downloaded — attach it in your email", "info");
  } catch(err){
    console.error(err);
    toast("Could not prepare report: " + err.message, "fail");
  }
}

// Pull the Excel-build logic into a reusable function returning a Blob.
async function buildRecordXLSXBlob(r){
  if(typeof JSZip === "undefined") throw new Error("Library not loaded — refresh and try again");
  const buf = getTemplateArrayBuffer(r);
  const photoPositions = getPhotoPositions(r);
  const zip = await JSZip.loadAsync(buf);
  const photos = normalizePhotos(r.photos).map(p => p.dataURL).filter(Boolean);
  const replacements = buildReplacements(r);

  // Apply text replacements to sheet1
  const sheetPath = "xl/worksheets/sheet1.xml";
  const sheetFile = zip.file(sheetPath);
  if(!sheetFile) throw new Error("Template missing sheet");
  let sheetXml = await sheetFile.async("string");
  for(const [k, v] of Object.entries(replacements)){
    sheetXml = sheetXml.split(k).join(xmlEscape(v));
  }
  zip.file(sheetPath, sheetXml);

  // Embed photos + signature (reuse logic). Skip if no drawing file.
  if(photos.length || r.signatureDataURL){
    const drawingFile = zip.file("xl/drawings/drawing1.xml");
    const relsFile = zip.file("xl/drawings/_rels/drawing1.xml.rels");
    const ctFile = zip.file("[Content_Types].xml");
    if(drawingFile && relsFile && ctFile){
      let drawingXml = await drawingFile.async("string");
      let relsXml = await relsFile.async("string");
      let ctXml = await ctFile.async("string");
      let maxRid = 0;
      const ridRe = /Id="rId(\d+)"/g;
      let m;
      while((m = ridRe.exec(relsXml)) !== null){
        const n = parseInt(m[1], 10);
        if(n > maxRid) maxRid = n;
      }
      let maxPicId = 1000;
      const ensureExt = (ext, mime) => {
        if(!ctXml.includes(`Extension="${ext}"`)){
          ctXml = ctXml.replace("</Types>", `<Default Extension="${ext}" ContentType="${mime}"/></Types>`);
        }
      };
      let newAnchors = "";
      let newRels = "";
      const max = Math.min(photos.length, photoPositions.length);
      for(let i = 0; i < max; i++){
        const parsed = dataURLToBytes(photos[i]);
        if(!parsed) continue;
        const imageName = `photo${i + 1}.${parsed.ext}`;
        const imagePath = `xl/media/${imageName}`;
        zip.file(imagePath, parsed.bytes);
        ensureExt(parsed.ext, parsed.ext === "png" ? "image/png" : "image/jpeg");
        const rId = ++maxRid;
        const picId = ++maxPicId;
        const ridStr = `rId${rId}`;
        const [fc, fr, tc, tr] = photoPositions[i];
        newAnchors += buildPhotoAnchor(ridStr, picId, fc, fr, tc, tr);
        newRels += `<Relationship Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="/${imagePath}" Id="${ridStr}"/>`;
      }
      if(r.signatureDataURL){
        const sigParsed = dataURLToBytes(r.signatureDataURL);
        if(sigParsed){
          const sigPos = getSignaturePosition(r);
          const sigName = `signature.${sigParsed.ext}`;
          const sigPath = `xl/media/${sigName}`;
          zip.file(sigPath, sigParsed.bytes);
          ensureExt(sigParsed.ext, sigParsed.ext === "png" ? "image/png" : "image/jpeg");
          const rId = ++maxRid;
          const picId = ++maxPicId;
          const ridStr = `rId${rId}`;
          const [fc, fr, tc, tr] = sigPos;
          newAnchors += buildPhotoAnchor(ridStr, picId, fc, fr, tc, tr);
          newRels += `<Relationship Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="/${sigPath}" Id="${ridStr}"/>`;
        }
      }
      drawingXml = drawingXml.replace(/<\/wsDr>\s*$/, newAnchors + "</wsDr>");
      relsXml = relsXml.replace(/<\/Relationships>\s*$/, newRels + "</Relationships>");
      zip.file("xl/drawings/drawing1.xml", drawingXml);
      zip.file("xl/drawings/_rels/drawing1.xml.rels", relsXml);
      zip.file("[Content_Types].xml", ctXml);
    }
  }

  return await zip.generateAsync({ type: "blob" });
}

async function exportRecordXLSX(recordId){
  if(typeof JSZip === "undefined"){
    toast("Library not loaded — refresh and try again", "fail");
    return;
  }
  const records = loadRecords();
  const r = records.find(x => x.id === recordId);
  if(!r){ toast("Record not found", "fail"); return; }

  try {
    const buf = getTemplateArrayBuffer(r);
    const photoPositions = getPhotoPositions(r);
    const zip = await JSZip.loadAsync(buf);

    // 1. Fill placeholders in the worksheet XML
    const sheetPath = "xl/worksheets/sheet1.xml";
    const sheetFile = zip.file(sheetPath);
    if(!sheetFile) throw new Error("Template missing worksheet");
    let sheetXml = await sheetFile.async("string");
    const replacements = buildReplacements(r);
    sheetXml = fillPlaceholders(sheetXml, replacements);
    zip.file(sheetPath, sheetXml);

    // 2. Embed photos
    const photos = normalizePhotos(r.photos).map(p => p.dataURL).filter(Boolean);
    if(photos.length){
      const drawingFile = zip.file("xl/drawings/drawing1.xml");
      const relsFile = zip.file("xl/drawings/_rels/drawing1.xml.rels");
      const ctFile = zip.file("[Content_Types].xml");
      if(drawingFile && relsFile && ctFile){
        let drawingXml = await drawingFile.async("string");
        let relsXml = await relsFile.async("string");
        let ctXml = await ctFile.async("string");

        // Find max rId / pic id
        let maxRid = 0;
        const ridRe = /Id="rId(\d+)"/g;
        let m;
        while((m = ridRe.exec(relsXml)) !== null){
          const n = parseInt(m[1], 10);
          if(n > maxRid) maxRid = n;
        }
        let maxPicId = 1000;
        const picIdRe = /<cNvPr\s+id="(\d+)"/g;
        while((m = picIdRe.exec(drawingXml)) !== null){
          const n = parseInt(m[1], 10);
          if(n > maxPicId) maxPicId = n;
        }

        // Ensure png/jpeg content types are registered
        const ensureExt = (ext, contentType) => {
          if(!ctXml.includes(`Extension="${ext}"`)){
            ctXml = ctXml.replace(/<\/Types>\s*$/, `<Default Extension="${ext}" ContentType="${contentType}"/></Types>`);
          }
        };

        const max = Math.min(photos.length, photoPositions.length);
        let newAnchors = "";
        let newRels = "";
        for(let i = 0; i < max; i++){
          const parsed = dataURLToBytes(photos[i]);
          if(!parsed){ console.warn("Could not parse photo", i); continue; }
          const { ext, bytes } = parsed;
          const imageName = `photo${i + 1}.${ext}`;
          const imagePath = `xl/media/${imageName}`;
          zip.file(imagePath, bytes);
          ensureExt(ext, ext === "png" ? "image/png" : "image/jpeg");

          const rId = ++maxRid;
          const picId = ++maxPicId;
          const ridStr = `rId${rId}`;
          const [fc, fr, tc, tr] = photoPositions[i];
          newAnchors += buildPhotoAnchor(ridStr, picId, fc, fr, tc, tr);
          newRels += `<Relationship Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="/${imagePath}" Id="${ridStr}"/>`;
        }

        // Embed signature image if present. Each template has its own signature cell location.
        if(r.signatureDataURL){
          const sigParsed = dataURLToBytes(r.signatureDataURL);
          if(sigParsed){
            const sigPos = getSignaturePosition(r);
            const sigName = `signature.${sigParsed.ext}`;
            const sigPath = `xl/media/${sigName}`;
            zip.file(sigPath, sigParsed.bytes);
            ensureExt(sigParsed.ext, sigParsed.ext === "png" ? "image/png" : "image/jpeg");
            const rId = ++maxRid;
            const picId = ++maxPicId;
            const ridStr = `rId${rId}`;
            const [fc, fr, tc, tr] = sigPos;
            newAnchors += buildPhotoAnchor(ridStr, picId, fc, fr, tc, tr);
            newRels += `<Relationship Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="/${sigPath}" Id="${ridStr}"/>`;
          }
        }

        drawingXml = drawingXml.replace(/<\/wsDr>\s*$/, newAnchors + "</wsDr>");
        relsXml = relsXml.replace(/<\/Relationships>\s*$/, newRels + "</Relationships>");

        zip.file("xl/drawings/drawing1.xml", drawingXml);
        zip.file("xl/drawings/_rels/drawing1.xml.rels", relsXml);
        zip.file("[Content_Types].xml", ctXml);
      }
    }

    // 3. Save
    const blob = await zip.generateAsync({
      type: "blob",
      mimeType: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
      compression: "DEFLATE",
    });

    const safe = (r.assetId || r.itemName || "record").replace(/[^a-z0-9_-]/gi, "_").slice(0, 40);
    const dateStamp = (r.inspDate || r.createdAt.slice(0,10)).replace(/[^0-9-]/g, "");
    downloadBlob(blob, `Scotia_CVI_${safe}_${dateStamp}.xlsx`);
    toast("Excel report exported", "pass");
  } catch(err){
    console.error(err);
    toast("Export failed: " + err.message, "fail");
  }
}

async function exportAllXLSX(){
  if(typeof JSZip === "undefined"){
    toast("Library not loaded — refresh and try again", "fail");
    return;
  }
  const records = loadRecords();
  if(!records.length){ toast("No records to export", "info"); return; }

  try {
    // Export each record as its own xlsx, staggered so the browser handles them
    for(let i = 0; i < records.length; i++){
      // Re-use exportRecordXLSX logic by calling it
      await exportRecordXLSX(records[i].id);
      // Brief pause between downloads
      if(i < records.length - 1){
        await new Promise(res => setTimeout(res, 400));
      }
    }
    toast(`Exported ${records.length} report${records.length===1?"":"s"}`, "pass");
  } catch(err){
    console.error(err);
    toast("Export failed: " + err.message, "fail");
  }
}

/* ============================================================
   Tabs
============================================================ */
function setTab(tab){
  activeTab = tab;
  const guideView = document.getElementById("guideView");
  const ndtView = document.getElementById("ndtView");
  const histView = document.getElementById("historyView");
  const tGuide = document.getElementById("tabGuide");
  const tNdt = document.getElementById("tabNdt");
  const tHist = document.getElementById("tabHistory");

  // Hide all
  guideView.style.display = "none";
  ndtView.style.display = "none";
  histView.style.display = "none";
  tGuide.classList.remove("active");
  tNdt.classList.remove("active");
  tHist.classList.remove("active");

  if(tab === "history"){
    histView.style.display = "";
    tHist.classList.add("active");
    document.getElementById("q").placeholder = "Search records by client, asset, inspector…";
    renderHistory();
  } else if(tab === "ndt"){
    ndtView.style.display = "";
    tNdt.classList.add("active");
    // Re-render NDT list with current search
    const q = document.getElementById("q").value;
    renderNDT(q);
    // Update search placeholder
    document.getElementById("q").placeholder = "Search NDT methods, AS 1171, ultrasonic…";
  } else {
    // Visual / guide
    guideView.style.display = "";
    tGuide.classList.add("active");
    runSearch();  // re-render Visual list
    document.getElementById("q").placeholder = "Search shackle, AS 4991, MEWP…";
  }
}

/* ============================================================
   Search runner
============================================================ */
function runSearch(){
  const q = document.getElementById("q").value;
  document.getElementById("clearBtn").classList.toggle("show", q.length > 0);

  if(activeTab === "history"){
    renderHistory();
    return;
  }
  if(activeTab === "ndt"){
    renderNDT(q);
    return;
  }

  // Default: Visual (Guide) tab
  const items = itemSearch(q);
  const standards = standardsSearch(q);
  const combined = [...items, ...standards].sort((a,b) => b.score - a.score);
  document.getElementById("count").textContent = q
    ? `${combined.length} match${combined.length===1?"":"es"}`
    : `${ITEMS.length} items`;
  renderResults(combined.slice(0, 50));
}

    </div>
    <div class="authError" id="piErr"></div>
    <button class="authPrimaryBtn" id="piGo" type="button">Sign in</button>
    <button class="authSecondaryBtn" id="piBack" type="button">Use a different profile</button>
    <button class="authLink" id="piForgot" type="button">Forgot PIN?</button>
  `;
  const showErr = (m) => document.getElementById("piErr").textContent = m;
  const tryLogin = async () => {
    const pin = document.getElementById("piPin").value;
    if(!pin){ showErr("Enter your PIN"); return; }
    showErr("");
    const ok = await verifyPin(user.id, pin);
    if(!ok){ showErr("Incorrect PIN"); document.getElementById("piPin").value = ""; return; }
    setCurrentUserId(user.id);
    pendingUserId = null;
    rebuildItems();
    enterApp();
    toast(`Welcome back, ${user.name}`, "pass");
  };
  document.getElementById("piGo").addEventListener("click", tryLogin);
  document.getElementById("piPin").addEventListener("keydown", e => { if(e.key === "Enter") tryLogin(); });
  document.getElementById("piBack").addEventListener("click", () => { pendingUserId = null; renderAuthState(); });
  document.getElementById("piForgot").addEventListener("click", () => {
    showConfirm("Reset this profile?",
      `This will permanently delete "${user.name}" and all their inspection records and custom items from this device. This can't be undone.`,
      () => {
        deleteUserProfile(user.id);
        pendingUserId = null;
        toast("Profile reset", "info");
        renderAuthState();
      });
  });
}

function enterApp(){
  hideAuthView();
  refreshUserPill();
  rebuildItems();
  runSearch();
  updateHistoryBadge();
  checkBackupReminder();
}

function signOut(){
  setCurrentUserId(null);
  closeUserMenu();
  pendingUserId = null;
  renderAuthState();
  showAuthView();
}

function refreshUserPill(){
  const u = getCurrentUser();
  const pill = document.getElementById("userPill");
  if(!pill) return;
  if(!u){ pill.style.display = "none"; return; }
  pill.style.display = "flex";
  document.getElementById("userPillName").textContent = u.name;
  document.getElementById("userPillAvatar").textContent = userInitials(u.name);
}

function openUserMenu(){
  const u = getCurrentUser();
  if(!u) return;
  document.getElementById("userMenuName").textContent = u.name;
  document.getElementById("userMenu").classList.add("open");
}
function closeUserMenu(){
  document.getElementById("userMenu").classList.remove("open");
}

// Wire user pill + menu interactions on page load
document.addEventListener("DOMContentLoaded", () => {
  const pill = document.getElementById("userPill");
  if(pill) pill.addEventListener("click", (e) => {
    e.stopPropagation();
    const menu = document.getElementById("userMenu");
    if(menu.classList.contains("open")) closeUserMenu();
    else openUserMenu();
  });
  // Outside-click closes the user menu
  document.addEventListener("click", (e) => {
    const m = document.getElementById("userMenu");
    if(!m || !m.classList.contains("open")) return;
    if(!m.contains(e.target) && e.target !== pill && !pill.contains(e.target)){
      closeUserMenu();
    }
  });

  document.getElementById("umSwitch").addEventListener("click", () => {
    closeUserMenu();
    signOut();
  });
  document.getElementById("umChangePin").addEventListener("click", () => {
    closeUserMenu();
    const u = getCurrentUser(); if(!u) return;
    const newPin = prompt(`Enter a new 4–6 digit PIN for ${u.name}:`);
    if(newPin === null) return;
    if(!/^\d{4,6}$/.test(newPin)){ toast("PIN must be 4–6 digits", "fail"); return; }
    const confirmPin = prompt("Confirm new PIN:");
    if(confirmPin !== newPin){ toast("PINs don't match", "fail"); return; }
    changeUserPin(u.id, newPin).then(() => toast("PIN updated", "pass"))
                                .catch(e => toast(e.message || "Could not update PIN", "fail"));
  });
  document.getElementById("umEquipment").addEventListener("click", () => {
    closeUserMenu();
    showEquipmentRegister();
  });
  document.getElementById("umRename").addEventListener("click", () => {
    closeUserMenu();
    const u = getCurrentUser(); if(!u) return;
    const newName = prompt("New name:", u.name);
    if(newName === null) return;
    try { renameUser(u.id, newName); refreshUserPill(); toast("Profile renamed", "pass"); }
    catch(e){ toast(e.message || "Could not rename", "fail"); }
  });
  document.getElementById("umDelete").addEventListener("click", () => {
    closeUserMenu();
    const u = getCurrentUser(); if(!u) return;
    showConfirm("Delete your profile?",
      `This will permanently delete "${u.name}" and all of your inspection records and custom items from this device. Other inspectors on this device are unaffected. This can't be undone.`,
      () => {
        deleteUserProfile(u.id);
        toast("Profile deleted", "info");
        renderAuthState();
        showAuthView();
      });
  });
});

// Page-load gate: show auth view if not signed in
(function initAuth(){
  const uid = getCurrentUserId();
  if(uid && loadUsers().find(u => u.id === uid)){
    // Already signed in — proceed
    rebuildItems();
    refreshUserPill();
    checkBackupReminder();
  } else {
    // Not signed in — show auth view
    setCurrentUserId(null);
    renderAuthState();
    showAuthView();
  }
})();

/* ============================================================
   Connection indicator — green "Online" / red "Offline"
   navigator.onLine reflects network reachability; the online/offline
   events fire when it flips. Updates immediately when the connection
   drops or returns.
============================================================ */
function updateConnStatus(){
  const pill = document.getElementById("connDot");
  const label = document.getElementById("connLabel");
  if(!pill || !label) return;
  if(navigator.onLine){
    pill.classList.add("online");
    pill.classList.remove("offline");
    label.textContent = "Online";
  } else {
    pill.classList.add("offline");
    pill.classList.remove("online");
    label.textContent = "Offline";
  }
}
window.addEventListener("online", () => {
  updateConnStatus();
  toast("Back online", "pass");
});
window.addEventListener("offline", () => {
  updateConnStatus();
  toast("Offline — your work is saved locally", "info");
});
updateConnStatus();

// Initial render
runSearch();
updateHistoryBadge();
</script>

<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(console.error);
    });
  }
</script>
