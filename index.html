<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Scotia • AU Lifting Standards Quick Guide</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scotia Guide">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  :root {
    --bg:#0b1220;
    --bg-elev:#0e1730;
    --card:#121b2f;
    --card-2:#16213a;
    --muted:#93a4c7;
    --muted-2:#6f7fa3;
    --text:#e8eefc;
    --accent:#6aa7ff;
    --accent-strong:#3b82f6;
    --good:#4ade80;
    --warn:#fbbf24;
    --bad:#fb7185;
    --line:#243155;
    --line-2:#2e3d65;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== App shell ===== */
  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Auth overlay ===== */
  .authView {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: linear-gradient(180deg, #0b1220 0%, #1a253d 100%);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .authView.open { display: flex; }
  .authCard {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 18px;
    padding: 32px 24px 24px;
    box-shadow: 0 24px 60px rgba(0,0,0,.4);
    text-align: center;
  }
  .authBrand {
    font-family: "Franklin Gothic Demi", "Arial Black", system-ui, sans-serif;
    font-weight: 900;
    font-size: 38px;
    color: #376092;
    letter-spacing: 2px;
    line-height: 1;
    font-style: italic;
  }
  .authBrandO {
    display: inline-block;
    border: 3px solid #376092;
    border-radius: 50%;
    width: 0.8em;
    height: 0.8em;
    line-height: 0.7em;
    font-size: 0.85em;
    font-style: normal;
    margin: 0 1px;
  }
  .authBrandSub {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .authTitle {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a22;
    margin: 0 0 6px;
  }
  .authSubtitle {
    font-size: 13px;
    color: #666;
    margin: 0 0 22px;
    line-height: 1.5;
  }
  .authContent { text-align: left; }
  .authContent .field {
    margin-bottom: 14px;
  }
  .authContent label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
  }
  .authContent input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1.5px solid #d0d0d8;
    border-radius: 10px;
    background: #fff;
    font-size: 16px;
    color: #1a1a22;
    font-family: inherit;
  }
  .authContent input:focus {
    outline: none;
    border-color: #376092;
    box-shadow: 0 0 0 3px rgba(55, 96, 146, 0.15);
  }
  .authContent input[type="password"] {
    letter-spacing: 6px;
    font-size: 22px;
    text-align: center;
  }
  .authPrimaryBtn, .authSecondaryBtn {
    width: 100%;
    box-sizing: border-box;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    margin-top: 8px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .authPrimaryBtn {
    background: #376092;
    color: #fff;
  }
  .authPrimaryBtn:hover { background: #2c4f78; }
  .authPrimaryBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  .authSecondaryBtn {
    background: transparent;
    color: #376092;
    border: 1.5px solid #d0d0d8;
  }
  .authSecondaryBtn:hover { border-color: #376092; }
  .authError {
    color: #c83a3a;
    font-size: 13px;
    margin: 8px 0 4px;
    font-weight: 600;
    min-height: 18px;
  }
  .authFootNote {
    font-size: 11px;
    color: #999;
    margin-top: 20px;
    line-height: 1.5;
    text-align: center;
  }
  .authLink {
    background: none;
    border: none;
    color: #376092;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
    font-family: inherit;
    margin-top: 8px;
    display: inline-block;
  }
  .profileList {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 4px;
  }
  .profileBtn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 12px;
    background: #f4f4f6;
    border: 1.5px solid #e0e0e8;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s, border-color .12s;
  }
  .profileBtn:hover { background: #ecedf2; border-color: #376092; }
  .profileAvatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #376092;
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 15px;
    flex: 0 0 auto;
  }
  .profileBtnName {
    flex: 1;
    font-weight: 700;
    color: #1a1a22;
    font-size: 14px;
  }
  .profileBtnArrow {
    color: #888;
    width: 16px;
    height: 16px;
  }

  /* User pill in header */
  .userPill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    cursor: pointer;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s;
  }
  .userPill:hover { background: rgba(255,255,255,.14); }
  .userPillAvatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #376092;
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 11px;
    flex: 0 0 auto;
  }
  .userPillName {
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .userPillChevron {
    width: 12px;
    height: 12px;
    opacity: 0.6;
  }

  /* User menu popover */
  .userMenu {
    position: fixed;
    top: 60px;
    right: 14px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
    min-width: 220px;
    z-index: 250;
    display: none;
    overflow: hidden;
  }
  .userMenu.open { display: block; }
  .userMenuHeader {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .userMenuHeader .name { font-weight: 700; color: var(--text); }
  .userMenuHeader .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .userMenuItem {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 14px;
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .userMenuItem:hover { background: var(--card); }
  .userMenuItem svg { width: 16px; height: 16px; opacity: 0.7; }
  .userMenuItem.danger { color: var(--bad); }
  .userMenuItem.danger svg { opacity: 0.8; }
  .userMenuDivider { border-top: 1px solid var(--line); margin: 4px 0; }

  /* ===== Header ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(11,18,32,.94);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: calc(var(--safe-top) + 12px) 14px 10px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }

  .headRow {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logoBox {
    height: 38px;
    padding: 3px 8px;
    border-radius: 8px;
    background: #ffffff;
    display: grid; place-items: center;
    flex: 0 0 auto;
    overflow: hidden;
  }
  .logoBox img { height: 32px; width: auto; display: block; }
  .logoBox svg { width: 38px; height: 38px; }
  .brandTitle { min-width: 0; flex: 1; }
  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .2px;
    line-height: 1.2;
  }
  .brandMeta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .connDot {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .3px;
    text-transform: uppercase;
    transition: background .2s, color .2s, border-color .2s;
  }
  .connDot::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    transition: background .2s, box-shadow .2s;
  }
  .connDot.online {
    background: rgba(74,222,128,.10);
    color: var(--good);
    border-color: rgba(74,222,128,.30);
  }
  .connDot.online::before {
    background: var(--good);
    box-shadow: 0 0 8px rgba(74,222,128,.6);
  }
  .connDot.offline {
    background: rgba(251,113,133,.10);
    color: var(--bad);
    border-color: rgba(251,113,133,.30);
  }
  .connDot.offline::before {
    background: var(--bad);
    box-shadow: 0 0 8px rgba(251,113,133,.6);
  }

  /* Search row */
  .searchRow {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .searchWrap {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .searchWrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--muted-2);
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    padding: 13px 40px 13px 40px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    outline: none;
    font-size: 15px;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="search"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(106,167,255,.15);
  }
  input[type="search"]::-webkit-search-cancel-button { display: none; }
  .clearInline {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.06);
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .clearInline.show { display: flex; }
  .clearInline svg { width: 12px; height: 12px; }

  .iconBtn {
    width: 46px;
    height: 46px;
    flex: 0 0 auto;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--text);
    display: grid;
    place-items: center;
    cursor: pointer;
    padding: 0;
  }
  .iconBtn svg { width: 18px; height: 18px; }
  .iconBtn:active { background: var(--card-2); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 4px;
  }
  .tabs button {
    flex: 1;
    padding: 9px 10px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tabs button.active {
    background: var(--accent-strong);
    color: white;
    box-shadow: 0 2px 6px rgba(59,130,246,.3);
  }
  .tabs button .badge {
    background: rgba(255,255,255,.2);
    color: white;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 700;
  }
  .tabs button:not(.active) .badge {
    background: rgba(147,164,199,.18);
    color: var(--muted);
  }

  /* ===== Main ===== */
  main {
    flex: 1;
    padding: 14px 14px calc(80px + var(--safe-bottom));
  }

  .resultMeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 12px;
  }
  .resultMeta .demoLink {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }

  /* Cards / list items */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card);
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .item:active { transform: scale(.99); border-color: var(--accent); }
  .item .top {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .item .icon {
    width: 44px; height: 44px;
    flex: 0 0 auto;
    border-radius: 11px;
    border: 1px solid var(--line);
    background: rgba(106,167,255,.08);
    display: grid; place-items: center;
    color: var(--accent);
  }
  .item .icon svg { width: 28px; height: 28px; }
  .item .body { min-width: 0; flex: 1; }
  .item .name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.3;
    color: var(--text);
  }
  .item .cat {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }

  /* Add custom item card */
  .item.addCustomItem {
    border: 1.5px dashed rgba(55, 96, 146, 0.45);
    background: linear-gradient(180deg, rgba(55, 96, 146, 0.06), rgba(55, 96, 146, 0.02));
  }
  .item.addCustomItem:hover {
    border-color: #376092;
    background: linear-gradient(180deg, rgba(55, 96, 146, 0.10), rgba(55, 96, 146, 0.04));
  }
  .item.addCustomItem .icon.addIcon {
    background: #376092;
    border-color: #1f3f66;
    color: #fff;
  }
  .item.addCustomItem .name { color: #376092; }

  /* Custom badge on item names */
  .customBadge {
    display: inline-block;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #376092;
    background: rgba(55, 96, 146, 0.12);
    border: 1px solid rgba(55, 96, 146, 0.3);
    padding: 2px 6px;
    border-radius: 4px;
    vertical-align: middle;
    margin-left: 4px;
  }
  .importedBadge {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #5e8cc3;
    background: rgba(55, 96, 146, 0.10);
    border: 1px solid rgba(55, 96, 146, 0.3);
    padding: 4px 8px;
    border-radius: 6px;
  }
  .item .arrow {
    color: var(--muted-2);
    flex: 0 0 auto;
  }
  .item .arrow svg { width: 16px; height: 16px; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 9px;
    padding-left: 56px;
  }
  .chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(106,167,255,.1);
    color: var(--accent);
    border: 1px solid rgba(106,167,255,.2);
    font-weight: 600;
  }
  .chip.secondary {
    background: rgba(147,164,199,.08);
    color: var(--muted);
    border-color: var(--line);
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty svg { width: 40px; height: 40px; opacity: .4; margin-bottom: 10px; }
  .empty p { margin: 0; font-size: 13px; }
  .empty .hints { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .empty .hints button {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }

  /* ===== History items ===== */
  .historyItem {
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card);
    cursor: pointer;
    transition: border-color .15s;
  }
  .historyItem:active { border-color: var(--accent); }
  .historyItem .top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .historyItem .name { font-weight: 700; font-size: 14px; }
  .historyItem .meta { color: var(--muted); font-size: 11px; margin-top: 3px; line-height: 1.4; }
  .historyItem .preview { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.4; }
  .statusPill {
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--line);
    font-weight: 700;
    letter-spacing: .4px;
    flex: 0 0 auto;
  }
  .status-pass { color: var(--good); border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.1); }
  .status-quarantine { color: var(--warn); border-color: rgba(251,191,36,.35); background: rgba(251,191,36,.1); }
  .status-fail { color: var(--bad); border-color: rgba(251,113,133,.35); background: rgba(251,113,133,.1); }

  /* ===== Sheet (details overlay) ===== */
  .sheet {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    visibility: hidden;
  }
  .sheet.open { pointer-events: auto; visibility: visible; }
  .sheetBackdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.6);
    opacity: 0;
    transition: opacity .25s ease;
  }
  .sheet.open .sheetBackdrop { opacity: 1; }
  .sheetPanel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 92dvh;
    background: var(--bg);
    border-top: 1px solid var(--line);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: 0 -10px 40px rgba(0,0,0,.5);
  }
  .sheet.open .sheetPanel { transform: translateY(0); }
  .sheetHandle {
    width: 40px;
    height: 4px;
    background: var(--line-2);
    border-radius: 999px;
    margin: 8px auto 0;
    flex: 0 0 auto;
  }
  .sheetHeader {
    padding: 10px 16px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 0 0 auto;
  }
  .sheetHeader .icon {
    width: 44px; height: 44px;
    flex: 0 0 auto;
    border-radius: 11px;
    border: 1px solid var(--line);
    background: rgba(106,167,255,.08);
    display: grid; place-items: center;
    color: var(--accent);
  }
  .sheetHeader .icon svg { width: 28px; height: 28px; }
  .sheetHeader .titleBlock { flex: 1; min-width: 0; }
  .sheetHeader .title { font-size: 16px; font-weight: 800; line-height: 1.25; }
  .sheetHeader .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sheetClose {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    padding: 0;
  }
  .sheetClose svg { width: 16px; height: 16px; }

  .sheetBody {
    overflow-y: auto;
    padding: 14px 16px calc(20px + var(--safe-bottom));
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }
  .sheetBody.withFooter { padding-bottom: calc(110px + var(--safe-bottom)); }

  .sheetFooter {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--bg) 60%, rgba(11,18,32,0));
    padding: 14px 16px calc(14px + var(--safe-bottom));
    border-top: 1px solid var(--line);
    display: grid;

  .promptList {

  .formGrid {

  .field { display: flex; flex-direction: column; }

  .photoThumb {

  /* Equipment register rows */
  .eqRow {

  /* Reason picker modal */
  .reasonModal {

  .req {

  .genBtn {

  /* Stats dashboard */
  .statsRow {

  .statBox.quarColor .statNum { color: var(--warn); }

  /* Snippets / saved phrases */
  .snippetBar {
    display: flex;
    flex-wrap: wrap;

  .snippetChip {

  /* Voice mic button */
  .micBtn {

  @keyframes micPulse {

  /* Signature pad */

  /* Toast */
  /* Camera capture modal */

    flex-direction: column;

  .toast {

<script>
/* ============================================================
   User profiles & auth (multi-profile on shared device)
   IMPORTANT: This is multi-profile, NOT real security.
   The PIN keeps records separate but doesn't encrypt anything.
   localStorage is readable by anyone with browser dev tools.
============================================================ */
const USERS_KEY = "scotia_users_v1";
const CURRENT_USER_KEY = "scotia_current_user_v1";

function loadUsers(){
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || "[]"); }
  catch { return []; }
}
function saveUsers(arr){
  localStorage.setItem(USERS_KEY, JSON.stringify(arr));
}
function getCurrentUserId(){
  return localStorage.getItem(CURRENT_USER_KEY) || null;
}
function getCurrentUser(){
  const id = getCurrentUserId();
  if(!id) return null;
  return loadUsers().find(u => u.id === id) || null;
}
function setCurrentUserId(id){
  if(id) localStorage.setItem(CURRENT_USER_KEY, id);
  else localStorage.removeItem(CURRENT_USER_KEY);
}

// SHA-256 hash of (pin + salt) using Web Crypto API
async function hashPin(pin, salt){
  const enc = new TextEncoder();
  const data = enc.encode(String(pin) + ":" + String(salt));
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}
function generateSalt(){
  // 16 bytes of randomness, hex-encoded
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function createUserProfile(name, pin){
  const trimmed = (name || "").trim();
  if(!trimmed) throw new Error("Name is required");
  if(!/^\d{4,6}$/.test(pin)) throw new Error("PIN must be 4–6 digits");
  const users = loadUsers();
  if(users.some(u => u.name.toLowerCase() === trimmed.toLowerCase())){
    throw new Error("That name is already in use on this device");
  }
  const salt = generateSalt();
  const pinHash = await hashPin(pin, salt);
  const id = (crypto?.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
  const user = { id, name: trimmed, salt, pinHash, createdAt: new Date().toISOString() };
  users.push(user);
  saveUsers(users);
  return user;
}

async function verifyPin(userId, pin){
  const user = loadUsers().find(u => u.id === userId);
  if(!user) return false;
  const hash = await hashPin(pin, user.salt);
  return hash === user.pinHash;
}

async function changeUserPin(userId, newPin){
  if(!/^\d{4,6}$/.test(newPin)) throw new Error("PIN must be 4–6 digits");
  const users = loadUsers();
  const u = users.find(x => x.id === userId);
  if(!u) throw new Error("User not found");
  u.salt = generateSalt();
  u.pinHash = await hashPin(newPin, u.salt);
  saveUsers(users);
}

function renameUser(userId, newName){
  const trimmed = (newName || "").trim();
  if(!trimmed) throw new Error("Name is required");
  const users = loadUsers();
  if(users.some(u => u.id !== userId && u.name.toLowerCase() === trimmed.toLowerCase())){
    throw new Error("That name is already in use");
  }
  const u = users.find(x => x.id === userId);
  if(!u) throw new Error("User not found");
  u.name = trimmed;
  saveUsers(users);
}

function deleteUserProfile(userId){
  // Remove user's data
  localStorage.removeItem(`scotia_user_${userId}_inspections_v1`);
  localStorage.removeItem(`scotia_user_${userId}_custom_items_v1`);
  // Remove from users list
  saveUsers(loadUsers().filter(u => u.id !== userId));
  // If they were currently signed in, sign out
  if(getCurrentUserId() === userId) setCurrentUserId(null);
}

function userInitials(name){
  return String(name || "?")
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map(s => s[0]?.toUpperCase() || "")
    .join("") || "?";
}

// On first launch with this version: if old data exists under the pre-profile keys,
// migrate it into the user's bucket when they create their first profile.
function migrateLegacyDataIntoUser(userId){
  const legacyRecordsKey = "exodrill_ndt_inspections_v1";
  const legacyCustomKey = "scotia_custom_items_v1";
  const legacyRecords = localStorage.getItem(legacyRecordsKey);
  const legacyCustom = localStorage.getItem(legacyCustomKey);
  let migrated = 0;
  if(legacyRecords){
    localStorage.setItem(`scotia_user_${userId}_inspections_v1`, legacyRecords);
    localStorage.removeItem(legacyRecordsKey);
    try { migrated = JSON.parse(legacyRecords).length || 0; } catch {}
  }
  if(legacyCustom){
    localStorage.setItem(`scotia_user_${userId}_custom_items_v1`, legacyCustom);
    localStorage.removeItem(legacyCustomKey);
  }
  return migrated;
}

/* ============================================================
   Icons
============================================================ */
function iconSVG(kind){
  const common = `fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"`;
  const wrap = (inner) => `<svg viewBox="0 0 48 48" aria-hidden="true"><g ${common}>${inner}</g></svg>`;
  switch(kind){
    case "shackle":
      return wrap(`<path d="M16 22v-6a8 8 0 0 1 16 0v6"/><path d="M14 22h20"/><path d="M18 22v14a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4V22"/><path d="M20 40h8"/>`);
    case "eyebolt":
      return wrap(`<circle cx="24" cy="16" r="8"/><path d="M20 24v4"/><path d="M28 24v4"/><path d="M20 28h8"/><path d="M22 28v12"/><path d="M26 28v12"/><path d="M20 40h8"/>`);

      return wrap(`<ellipse cx="24" cy="24" rx="14" ry="10"/><ellipse cx="24" cy="24" rx="9" ry="6"/>`);

      return wrap(`<path d="M14 18c0-5 4-9 10-9s10 4 10 9"/><path d="M14 18c0 6 4 10 10 10s10-4 10-10"/><path d="M18 28l-2 11"/><path d="M24 28v11"/><path d="M30 28l2 11"/>`);
    case "spreaderBeam":
      return wrap(`<path d="M10 28h28"/><path d="M14 28v6"/><path d="M34 28v6"/><path d="M24 10v12"/><path d="M20 10h8"/>`);
    case "vacuumLifter":
      return wrap(`<path d="M18 12h12"/><path d="M24 12v10"/><path d="M14 26h20"/><path d="M16 26c0 8 16 8 16 0"/><path d="M16 26v6"/><path d="M32 26v6"/>`);
    case "crane":
      return wrap(`<path d="M14 40V14"/><path d="M14 14h20"/><path d="M34 14v8"/><path d="M34 22l-6 6"/><path d="M28 28h8"/><path d="M32 28v6"/><path d="M18 40h12"/>`);
    case "mewp":
      return wrap(`<path d="M12 36h8"/><path d="M28 36h8"/><circle cx="16" cy="36" r="3"/><circle cx="32" cy="36" r="3"/><path d="M14 33l8-10h10"/><path d="M32 23v-8h6"/><path d="M38 15v8"/><path d="M20 23v10"/>`);
    case "offshoreBasket":
      // Offshore container/basket — rectangular body with side handles/padeyes and cross-bracing
      return wrap(`<path d="M10 18h28v22H10z"/><path d="M10 18l4-6h20l4 6"/><path d="M14 12v-2"/><path d="M34 12v-2"/><path d="M10 24h28"/><path d="M18 24v16"/><path d="M30 24v16"/>`);
    case "standard":
      return wrap(`<path d="M12 8h18a4 4 0 0 1 4 4v28H16a4 4 0 0 1-4-4V8z"/><path d="M18 16h12"/><path d="M18 22h12"/><path d="M18 28h8"/>`);
    case "custom":
      // Tag/label icon for custom items
      return wrap(`<path d="M28 8H10v18l16 16 18-18z"/><circle cx="17" cy="17" r="2.5"/>`);
    case "ndtMpi":
      // Magnetic field icon — horseshoe magnet with field lines
      return wrap(`<path d="M12 8v16a12 12 0 0 0 24 0V8"/><path d="M12 8h6v10"/><path d="M36 8h-6v10"/><path d="M24 36v6"/><path d="M19 40h10"/>`);
    case "ndtUt":
      // Ultrasonic wave icon

  { id:"ndt_ut", kind:"ndt", name:"Ultrasonic Testing (UT)", description:"Volumetric inspection using high-frequency sound. Probes transmit and receive ultrasound; reflections from discontinuities show on an A-scan display with depth and amplitude.", category:"Volumetric NDT", synonyms:["ut","ultrasonic","ultrasound","a-scan","thickness gauging","weld scan","manual ut","probe"], standards:[{ sid:"as2207", rel:"primary", note:"AS 2207 — UT of fusion welded joints." },{ sid:"iso9712", rel:"related", note:"Personnel certification (Level 1/2/3)." }], prompts:["Verify probe(s): frequency, angle, crystal size — match the procedure.","Calibrate using the correct reference block (V1, V2 or custom). Record DAC/TCG curves.","Check couplant type and surface preparation. Probe should glide without sticking.","Scan pattern: 100% coverage with overlap. Mark indications on the part.","Record amplitude, depth (skip distance), length, position of indications.","Compare against acceptance criteria in the procedure. Document all rejects with photos."] },

/* ============================================================
   Search
============================================================ */
function normalize(s){ return (s||"").toLowerCase().replace(/[^a-z0-9\/\s\-]/g," ").replace(/\s+/g," ").trim(); }
function scoreMatch(query,text){
  const q=normalize(query),t=normalize(text);
  if(!q)return 0;
  if(t===q)return 100;
  if(t.includes(q))return 70;
  const qt=q.split(" ").filter(Boolean);
  let h=0;
  for(const tok of qt){if(tok.length<2)continue;if(t.includes(tok))h+=1;}
  return Math.min(40,h*10)+(t.startsWith(q)?20:0);
}
function itemSearch(query){
  const q=normalize(query);
  if(!q)return ITEMS.map(i=>({type:"item",item:i,score:0}));
  const r=[];
  for(const item of ITEMS){
    let b=Math.max(scoreMatch(q,item.name),scoreMatch(q,item.description||""));
    for(const s of item.synonyms)b=Math.max(b,scoreMatch(q,s));
    for(const m of item.standards){
      const st=STANDARD_BY_ID[m.sid];
      if(st)b=Math.max(b,scoreMatch(q,st.code+" "+st.title));
    }
    if(b>0)r.push({type:"item",item,score:b});
  }
  r.sort((a,b)=>b.score-a.score||a.item.name.localeCompare(b.item.name));
  return r;
}
function standardsSearch(query){
  const q=normalize(query);
  if(!q)return [];
  const o=[];
  for(const st of STANDARDS){
    const s=Math.max(scoreMatch(q,st.code),scoreMatch(q,st.title),scoreMatch(q,(st.tags||[]).join(" ")),scoreMatch(q,st.summary));
    if(s>0)o.push({type:"standard",standard:st,score:s});
  }
  o.sort((a,b)=>b.score-a.score||a.standard.code.localeCompare(b.standard.code));
  return o;
}

function ndtSearch(query){
  // Search NDT methods + NDT-related standards
  const q = String(query || "").trim().toLowerCase();
  const methods = BUILTIN_NDT_METHODS.slice();
  if(!q) return methods.map(m => ({ type:"item", item: m, score: 1 }));
  return methods
    .map(m => {
      const hay = [m.name, m.description, m.category, ...(m.synonyms || [])].join(" ").toLowerCase();
      let score = 0;
      if(m.name.toLowerCase().includes(q)) score += 10;
      if(hay.includes(q)) score += 4;
      // Token match
      const tokens = q.split(/\s+/);
      for(const t of tokens) if(hay.includes(t)) score += 1;
      return { type:"item", item: m, score };
    })
    .filter(r => r.score > 0)
    .sort((a,b) => b.score - a.score);
}

// Resize an image file to keep storage manageable.
// Returns a Promise resolving to a data URL (JPEG).
function resizeImageFile(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Not an image"));
      img.onload = () => {
        let { width, height } = img;
        // Scale down if needed
        if(width > PHOTO_MAX_DIMENSION || height > PHOTO_MAX_DIMENSION){
          if(width > height){
            height = Math.round(height * (PHOTO_MAX_DIMENSION / width));
            width = PHOTO_MAX_DIMENSION;
          } else {
            width = Math.round(width * (PHOTO_MAX_DIMENSION / height));
            height = PHOTO_MAX_DIMENSION;
          }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        // Always export as JPEG for predictable sizing in xlsx
        resolve(canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelection(e){
  const input = e.target;
  const files = Array.from(input.files || []);
  if(!files.length) return;

  const remaining = MAX_PHOTOS - currentPhotos.length;
  if(remaining <= 0){
    toast(`Maximum ${MAX_PHOTOS} photos reached`, "info");
    input.value = "";
    return;
  }
  const toProcess = files.slice(0, remaining);
  if(files.length > remaining){
    toast(`Only adding ${remaining} more (max ${MAX_PHOTOS})`, "info");
  }

  for(const file of toProcess){
    try {
      const dataURL = await resizeImageFile(file);
      currentPhotos.push({ dataURL: dataURL, caption: "" });
    } catch(err){
      console.error("Photo error:", err);
      toast(`Skipped "${file.name}": ${err.message}`, "fail");
    }
  }
  input.value = "";  // allow re-selecting same file
  renderPhotoGrid();
}

/* ============================================================
   In-browser camera capture (works on Surface Pro, laptops, phones)
   Uses getUserMedia which actually accesses the webcam, unlike the
   <input capture=""> attribute that desktop browsers ignore.
============================================================ */
let cameraStream = null;
let cameraFacing = "environment";  // try rear cam first on phones; ignored on laptops
let cameraDevices = [];
let cameraDeviceIdx = 0;

async function openCameraCapture(){
  if(currentPhotos.length >= MAX_PHOTOS){
    toast(`Already at ${MAX_PHOTOS} photos`, "info");
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast("Camera not supported in this browser", "fail");
    // Fall back to file picker with capture attribute
    document.getElementById("cameraInput").click();
    return;
  }

  try {
    // First try: rear-facing if available (phones); plain video constraint covers laptops
    let constraints;
    try {
      constraints = { video: { facingMode: { ideal: cameraFacing }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false };
      cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(facingErr){
      // facingMode unsupported (typical on laptops) — drop it
      constraints = { video: { width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false };
      cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    }

    // Enumerate cameras so we can show the switch button when there's >1
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      cameraDevices = devices.filter(d => d.kind === "videoinput");
    } catch(e){ cameraDevices = []; }

    const modal = document.getElementById("cameraModal");
    const video = document.getElementById("cameraVideo");
    const switchBtn = document.getElementById("cameraSwitchBtn");
    video.srcObject = cameraStream;
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    switchBtn.style.display = cameraDevices.length > 1 ? "grid" : "none";
    // Lock body scroll while camera is open
    document.body.style.overflow = "hidden";
  } catch(err){
    console.error("Camera access failed:", err);
    if(err.name === "NotAllowedError" || err.name === "PermissionDeniedError"){
      toast("Camera permission denied — check browser settings", "fail");
    } else if(err.name === "NotFoundError" || err.name === "DevicesNotFoundError"){
      toast("No camera found on this device", "fail");
    } else if(err.name === "NotReadableError"){
      toast("Camera is in use by another app", "fail");
    } else {
      toast("Camera unavailable — using file picker", "info");
      document.getElementById("cameraInput").click();
    }
  }
}

function closeCameraCapture(){
  if(cameraStream){
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const modal = document.getElementById("cameraModal");
  modal.classList.remove("open");
  modal.setAttribute("aria-hidden", "true");
  const video = document.getElementById("cameraVideo");
  video.srcObject = null;
  document.body.style.overflow = "";
}

async function switchCameraDevice(){
  if(!cameraDevices.length) return;
  cameraDeviceIdx = (cameraDeviceIdx + 1) % cameraDevices.length;
  const targetId = cameraDevices[cameraDeviceIdx].deviceId;
  // Stop current
  if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: targetId }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    document.getElementById("cameraVideo").srcObject = cameraStream;
  } catch(err){
    console.error(err);
    toast("Could not switch camera", "fail");
  }
}

function captureCameraPhoto(){
  const video = document.getElementById("cameraVideo");
  if(!video.videoWidth || !video.videoHeight){
    toast("Camera not ready — wait a moment", "info");
    return;
  }
  if(currentPhotos.length >= MAX_PHOTOS){
    toast(`Maximum ${MAX_PHOTOS} photos reached`, "info");
    closeCameraCapture();
    return;
  }

  // Draw current video frame to a canvas, scaled to fit PHOTO_MAX_DIMENSION
  let w = video.videoWidth;
  let h = video.videoHeight;
  if(w > PHOTO_MAX_DIMENSION || h > PHOTO_MAX_DIMENSION){
    if(w > h){
      h = Math.round(h * (PHOTO_MAX_DIMENSION / w));
      w = PHOTO_MAX_DIMENSION;
    } else {
      w = Math.round(w * (PHOTO_MAX_DIMENSION / h));
      h = PHOTO_MAX_DIMENSION;
    }
  }
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, w, h);
  const dataURL = canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY);

  currentPhotos.push({ dataURL: dataURL, caption: "" });
  renderPhotoGrid();
  toast(`Photo ${currentPhotos.length}/${MAX_PHOTOS} captured`, "pass");

  // If at the limit, close; otherwise stay open for the next shot
  if(currentPhotos.length >= MAX_PHOTOS){
    closeCameraCapture();
  }
}

function renderStandardSelector(){

  if(!container) return;
  // Group: suggested (mapped to current item) first, then everything else
  const item = ITEM_BY_ID[selectedItemId];
  const itemStdIds = new Set((item?.standards || []).map(s => s.sid));

  const buildChip = (s) => {
    const selected = currentSelectedStandards.includes(s.id);
    const suggested = itemStdIds.has(s.id);
    return `<button type="button" class="stdChip ${selected ? "selected" : ""} ${suggested ? "suggested" : ""}" data-sid="${s.id}" title="${s.title}">${s.code}</button>`;
  };

  // Suggested standards (from the item) first, then the rest
  const suggested = STANDARDS.filter(s => itemStdIds.has(s.id));
  const others = STANDARDS.filter(s => !itemStdIds.has(s.id));

  let html = "";
  if(suggested.length){
    html += `<div class="stdChipGroup"><div class="stdChipGroupLabel">Suggested for this item</div><div class="stdChipRow">${suggested.map(buildChip).join("")}</div></div>`;
  }
  if(others.length){
    html += `<div class="stdChipGroup"><div class="stdChipGroupLabel">Other standards</div><div class="stdChipRow">${others.map(buildChip).join("")}</div></div>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.stdChip').forEach(btn => {
    btn.addEventListener('click', () => {
      const sid = btn.getAttribute('data-sid');
      const idx = currentSelectedStandards.indexOf(sid);
      if(idx >= 0){
        currentSelectedStandards.splice(idx, 1);
        btn.classList.remove('selected');
      } else {
        currentSelectedStandards.push(sid);
        btn.classList.add('selected');
      }
    });
  });
}

/* ============================================================
   Auto-incrementing report numbers (per user, per year)
============================================================ */
function reportCounterKey(){
  const uid = getCurrentUserId() || "anon";
  return `scotia_user_${uid}_report_counter`;
}
function generateReportNumber(){
  const key = reportCounterKey();
  const yy = String(new Date().getFullYear()).slice(2);
  let state;
  try { state = JSON.parse(localStorage.getItem(key) || "{}"); } catch { state = {}; }
  if(state.year !== yy){ state = { year: yy, n: 0 }; }
  state.n = (state.n || 0) + 1;
  localStorage.setItem(key, JSON.stringify(state));
  const num = `SIC-${yy}-${String(state.n).padStart(3, "0")}`;
  const input = document.getElementById("reportNumber");
  if(input){ input.value = num; }
  toast(`Report number generated: ${num}`, "pass");
}

/* ============================================================
   Reusable text snippets (saveable phrases for the notes field)
============================================================ */
function snippetsKey(){
  const uid = getCurrentUserId() || "anon";
  return `scotia_user_${uid}_snippets`;
}
function loadSnippets(){
  try { return JSON.parse(localStorage.getItem(snippetsKey()) || "[]"); }
  catch { return []; }
}
function saveSnippets(arr){ localStorage.setItem(snippetsKey(), JSON.stringify(arr)); }
function defaultSnippets(){
  return [
    "No relevant indications found at the time of inspection.",
    "Complies to the acceptance criteria.",
    "All welds visually examined; no defects observed.",
    "Item placed in quarantine pending further assessment.",
  ];
}
function renderSnippetsForNotes(){
  const bar = document.getElementById("snippetBar");
  if(!bar) return;
  let snippets = loadSnippets();
  if(!snippets.length){ snippets = defaultSnippets(); saveSnippets(snippets); }
  bar.innerHTML = snippets.map((s, i) => `
    <button type="button" class="snippetChip" data-i="${i}" title="${escapeHtml(s)}">
      ${escapeHtml(s.length > 40 ? s.slice(0, 38) + "…" : s)}
      <span class="delx" onclick="event.stopPropagation();deleteSnippet(${i})">×</span>
    </button>
  `).join("") + `<button type="button" class="snippetAdd" onclick="addSnippet()">+ Save phrase</button>`;
  bar.querySelectorAll(".snippetChip").forEach(btn => {
    btn.addEventListener("click", () => insertSnippet(parseInt(btn.dataset.i)));
  });
}
function insertSnippet(i){
  const snippets = loadSnippets();
  const text = snippets[i];
  if(!text) return;
  const notes = document.getElementById("notes");
  if(!notes) return;
  const cur = notes.value;
  notes.value = cur ? (cur.replace(/\s+$/, "") + "\n" + text) : text;
}
function addSnippet(){
  const notes = document.getElementById("notes");
  const text = (notes?.value || "").trim();
  if(!text){ toast("Type something in the notes field first, then tap Save phrase", "info"); return; }
  const snippets = loadSnippets();
  if(snippets.includes(text)){ toast("Already saved", "info"); return; }
  snippets.push(text);
  saveSnippets(snippets);
  renderSnippetsForNotes();
  toast("Phrase saved", "pass");
}
function deleteSnippet(i){
  const snippets = loadSnippets();
  snippets.splice(i, 1);
  saveSnippets(snippets);
  renderSnippetsForNotes();
}

/* ============================================================
   Voice-to-text for notes (Web Speech API)
============================================================ */
let activeRecognition = null;
function startVoiceCapture(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("Voice input not supported on this device/browser", "fail"); return; }
  const micBtn = document.getElementById("micBtn");
  const notes = document.getElementById("notes");
  if(!notes || !micBtn) return;

  if(activeRecognition){ try { activeRecognition.stop(); } catch{} activeRecognition = null; }
  const rec = new SR();
  rec.lang = "en-AU";
  rec.continuous = true;
  rec.interimResults = true;
  let baseText = notes.value;
  if(baseText && !baseText.endsWith(" ") && !baseText.endsWith("\n")) baseText += " ";

  rec.onstart = () => { micBtn.classList.add("recording"); toast("Listening… tap mic again to stop", "info"); };
  rec.onend = () => { micBtn.classList.remove("recording"); activeRecognition = null; };
  rec.onerror = (e) => {
    micBtn.classList.remove("recording");
    activeRecognition = null;
    if(e.error === "no-speech") return;
    if(e.error === "not-allowed"){ toast("Microphone access denied", "fail"); return; }
    toast("Voice error: " + e.error, "fail");
  };
  rec.onresult = (event) => {
    let final = "", interim = "";
    for(let i = event.resultIndex; i < event.results.length; i++){
      const t = event.results[i][0].transcript;
      if(event.results[i].isFinal) final += t;
      else interim += t;
    }
    if(final) baseText += final + " ";
    notes.value = baseText + interim;
  };
  rec.start();
  activeRecognition = rec;
}
function toggleVoiceCapture(){
  if(activeRecognition){ try { activeRecognition.stop(); } catch{} activeRecognition = null; return; }
  startVoiceCapture();
}

/* ============================================================
   Signature capture (canvas → data URL → record → Excel embed)
============================================================ */
let currentSignatureDataURL = "";
function initSignaturePad(){
  const canvas = document.getElementById("sigCanvas");
  const box = document.getElementById("sigBox");
  if(!canvas || !box) return;

  // Match canvas resolution to its display size for crisp lines
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#1F3F66";

  let drawing = false;
  let hasInk = !!currentSignatureDataURL;
  if(hasInk){
    // Restore previous signature into the canvas
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, rect.width, rect.height); box.classList.add("signed"); };
    img.src = currentSignatureDataURL;
  }

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return { x: point.clientX - r.left, y: point.clientY - r.top };
  };
  const start = (e) => {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  };
  const move = (e) => {
    if(!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if(!hasInk){ hasInk = true; box.classList.add("signed"); }
  };
  const end = () => {
    if(!drawing) return;
    drawing = false;
    if(hasInk){
      currentSignatureDataURL = canvas.toDataURL("image/png");
    }
  };

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start, { passive: false });
  canvas.addEventListener("touchmove", move, { passive: false });
  canvas.addEventListener("touchend", end);
}
function clearSignature(){
  const canvas = document.getElementById("sigCanvas");
  const box = document.getElementById("sigBox");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  box.classList.remove("signed");
  currentSignatureDataURL = "";
}

/* ============================================================
   Auto-backup reminder (prompts every N days to export records)
============================================================ */
const BACKUP_REMINDER_DAYS = 30;
function backupReminderKey(){
  const uid = getCurrentUserId() || "anon";
  return `scotia_user_${uid}_last_backup_reminder`;
}
function checkBackupReminder(){
  if(!getCurrentUserId()) return;
  const recCount = loadRecords().length;
  if(recCount < 5) return;  // not enough records to bother
  const key = backupReminderKey();
  const last = parseInt(localStorage.getItem(key) || "0");
  const now = Date.now();
  if(last && (now - last) < BACKUP_REMINDER_DAYS * 86400000) return;
  // Prompt for backup
  setTimeout(() => {
    showConfirm(
      "Time for a backup?",
      `You have ${recCount} records on this device. Backing up to a file means your work survives a phone wipe or browser clear.\n\nExport all records now?`,
      () => {
        localStorage.setItem(key, String(Date.now()));
        exportAllRecordsBackup();
      },
    );
    // Even if they dismiss, mark as reminded so we don't nag them on every load
    localStorage.setItem(key, String(now));
  }, 2000);
}
function exportAllRecordsBackup(){
  const records = loadRecords();
  if(!records.length){ toast("No records to back up", "info"); return; }
  const me = getCurrentUser();
  const payload = {
    _format: "scotia-backup",
    _version: 1,
    _exportedBy: me?.name || "Unknown",
    _exportedAt: new Date().toISOString(),
    records,
  };
  const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
  const dateStamp = new Date().toISOString().slice(0,10);
  downloadBlob(blob, `Scotia_backup_${(me?.name||"records").replace(/[^a-z0-9]/gi,"_")}_${dateStamp}.scotia-backup.json`);
  toast(`Backed up ${records.length} records`, "pass");
}

function equipmentKey(){

}
function loadEquipment(){
  try { return JSON.parse(localStorage.getItem(equipmentKey()) || "[]"); }
  catch { return []; }
}
function saveEquipment(arr){ localStorage.setItem(equipmentKey(), JSON.stringify(arr)); }
function isRecalOverdue(dateStr){
  if(!dateStr) return false;
  const d = new Date(dateStr);
  if(isNaN(d)) return false;
  return d < new Date();
}
function daysUntilRecal(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  if(isNaN(d)) return null;
  return Math.ceil((d - new Date()) / 86400000);
}

  const name = (document.getElementById("ciName")?.value || "").trim();
  if(!name){ toast("Item name is required", "fail"); return; }

  const category = (document.getElementById("ciCategory")?.value || "Custom").trim() || "Custom";

  const synonymsRaw = (document.getElementById("ciSynonyms")?.value || "").trim();
  const synonyms = synonymsRaw ? synonymsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];
  const promptsRaw = (document.getElementById("ciPrompts")?.value || "").trim();
  const prompts = promptsRaw ? promptsRaw.split(/\r?\n/).map(s => s.trim()).filter(Boolean) : [];
  // Default-selected standards become "primary" mappings on the custom item
  const standards = currentSelectedStandards.map(sid => ({ sid, rel: "primary", note: "" }));

  const newItem = {
    id: "custom_" + (crypto?.randomUUID ? crypto.randomUUID().slice(0, 8) : Date.now().toString(36)),
    name,
    description,
    category,
    synonyms,
    standards,
    prompts,
    isCustom: true,
  };

  const existing = loadCustomItems();
  existing.push(newItem);
  saveCustomItems(existing);
  rebuildItems();

  currentSelectedStandards = [];  // reset for next use
  toast(`"${name}" added to your items`, "pass");
  closeSheet();

  // Re-render the items list so the new item shows immediately
  runSearch();
}

/* ============================================================
   Inspection actions
============================================================ */
const REASON_CODES = {
  QUARANTINE: [
    "Pending NDT",
    "Pending OEM clarification",
    "Awaiting recalibration",
    "Awaiting parts / repair",
    "Awaiting certification documents",
    "Risk to personnel — to be assessed",
    "Other (specify)",
  ],
  FAIL: [
    "Cracked",
    "Distorted / bent",
    "Corrosion / wall thinning",
    "Worn beyond limits",
    "Damaged threads",
    "Out of certification",
    "Out of date / expired",
    "Mechanical damage",
    "Missing components / fasteners",
    "Failed load test",
    "Other (specify)",
  ],
};
let pendingSaveStatus = null;

function saveInspection(status){
  if(!selectedItemId){ toast("Select an item first.", "info"); return; }
  const item = ITEM_BY_ID[selectedItemId];
  if(!item){ toast("Item not found.", "fail"); return; }

  // For FAIL or QUARANTINE, gather a reason code before continuing
  if(status === "FAIL" || status === "QUARANTINE"){
    pendingSaveStatus = status;
    showReasonPicker(status);
    return;
  }

  continueSaveInspection(status, "");
}

function continueSaveInspection(status, reason){
  const item = ITEM_BY_ID[selectedItemId];
  if(!item) return;
  const isNdt = item.kind === "ndt";
  const get = id => (document.getElementById(id)?.value || "").trim();

  // Required-field validation
  const missing = [];
  if(!get("inspectorName")) missing.push("Inspector name");
  if(!get("inspDate")) missing.push("Inspection date");
  if(!get("assetId")) missing.push(isNdt ? "Part number" : "Asset ID / serial");
  if(missing.length){
    showConfirm(
      "Missing required fields",
      `These fields are usually required for a compliant report:\n\n• ${missing.join("\n• ")}\n\nSave anyway?`,
      () => actuallySaveInspection(status, item, isNdt, get, reason),
    );
    return;
  }
  actuallySaveInspection(status, item, isNdt, get, reason);
}

function showReasonPicker(status){
  const reasons = REASON_CODES[status] || [];
  const modal = document.getElementById("reasonModal");
  const list = document.getElementById("reasonList");
  document.getElementById("reasonTitle").textContent = `${status === "FAIL" ? "Fail" : "Quarantine"} — pick a reason`;
  list.innerHTML = reasons.map(r => `
    <button class="reasonBtn" data-reason="${escapeHtml(r)}" type="button">${escapeHtml(r)}</button>
  `).join("");
  list.querySelectorAll(".reasonBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const reason = btn.getAttribute("data-reason");
      if(reason.startsWith("Other")){
        const custom = prompt(`Specify reason for ${status}:`);
        if(custom === null) return;  // cancelled
        if(!custom.trim()){ toast("Reason required", "fail"); return; }
        modal.classList.remove("open");
        continueSaveInspection(status, custom.trim());
      } else {
        modal.classList.remove("open");
        continueSaveInspection(status, reason);
      }
    });
  });
  modal.classList.add("open");
}
function closeReasonPicker(){
  document.getElementById("reasonModal").classList.remove("open");
  pendingSaveStatus = null;
}

function actuallySaveInspection(status, item, isNdt, get, reason){
  const record = {
    id: (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2)),
    createdAt: nowISO(),
    status,
    statusReason: reason || "",
    itemId: item.id,
    itemName: item.name,
    category: item.category,
    description: item.description || "",
    kind: isNdt ? "ndt" : "visual",
    // Inspection record (common)
    inspectorName: get("inspectorName"),
    contactPerson: get("contactPerson"),
    siteName: get("siteName"),
    location: get("location"),
    assetId: get("assetId"),
    reportNumber: get("reportNumber"),
    inspDate: get("inspDate"),
    workOrder: get("workOrder"),
    // Visual lifting fields (empty for NDT)
    tare: isNdt ? "" : get("tare"),
    nett: isNdt ? "" : get("nett"),
    gross: isNdt ? "" : get("gross"),
    wll: isNdt ? "" : get("wll"),
    manufacturer: isNdt ? "" : get("manufacturer"),
    manufacturerSerial: isNdt ? "" : get("manufacturerSerial"),
    proofLoadRef: isNdt ? "" : get("proofLoadRef"),
    proofLoadDate: isNdt ? "" : get("proofLoadDate"),
    ndtRef: isNdt ? "" : get("ndtRef"),
    ndtDate: isNdt ? "" : get("ndtDate"),
    ccleRef: isNdt ? "" : get("ccleRef"),
    ccleDate: isNdt ? "" : get("ccleDate"),
    // NDT-specific fields (empty for visual)
    testSpecification: isNdt ? get("testSpecification") : "",
    testProcedure: isNdt ? get("testProcedure") : "",
    acceptanceCriteria: isNdt ? get("acceptanceCriteria") : "",
    areaExamined: isNdt ? get("areaExamined") : "",
    testRestriction: isNdt ? get("testRestriction") : "",
    materialType: isNdt ? get("materialType") : "",
    materialThickness: isNdt ? get("materialThickness") : "",
    jointGeometry: isNdt ? get("jointGeometry") : "",
    surfacePrep: isNdt ? get("surfacePrep") : "",
    coatingType: isNdt ? get("coatingType") : "",
    coatingThickness: isNdt ? get("coatingThickness") : "",
    weldingProcess: isNdt ? get("weldingProcess") : "",
    heatTreatment: isNdt ? get("heatTreatment") : "",
    unitType: isNdt ? get("unitType") : "",
    unitSerial: isNdt ? get("unitSerial") : "",
    recalDate: isNdt ? get("recalDate") : "",
    testBlockSerial: isNdt ? get("testBlockSerial") : "",
    sensitivity: isNdt ? get("sensitivity") : "",
    equipmentNotes: isNdt && item.id !== "ndt_et" ? get("equipmentNotes") : "",
    // EC-only probe details
    probe1Serial: isNdt && item.id === "ndt_et" ? get("probe1Serial") : "",
    probe1Freq:   isNdt && item.id === "ndt_et" ? get("probe1Freq")   : "",
    probe1Gain:   isNdt && item.id === "ndt_et" ? get("probe1Gain")   : "",
    probe1Phase:  isNdt && item.id === "ndt_et" ? get("probe1Phase")  : "",
    probe2Serial: isNdt && item.id === "ndt_et" ? get("probe2Serial") : "",
    probe2Freq:   isNdt && item.id === "ndt_et" ? get("probe2Freq")   : "",
    probe2Gain:   isNdt && item.id === "ndt_et" ? get("probe2Gain")   : "",
    probe2Phase:  isNdt && item.id === "ndt_et" ? get("probe2Phase")  : "",
    // Notes + photos
    notes: get("notes"),
    photos: normalizePhotos(currentPhotos),
    // Signature (data URL or empty)
    signatureDataURL: currentSignatureDataURL || "",
    // Standards
    selectedStandards: [...currentSelectedStandards],
    selectedStandardCodes: currentSelectedStandards.map(sid => STANDARD_BY_ID[sid]?.code || sid),
    primaryStandards: item.standards.filter(s => s.rel === "primary").map(s => STANDARD_BY_ID[s.sid]?.code || s.sid),
    relatedStandards: item.standards.filter(s => s.rel !== "primary").map(s => STANDARD_BY_ID[s.sid]?.code || s.sid),
  };

  const records = loadRecords();
  records.unshift(record);
  try {
    saveRecords(records);
  } catch(err){
    // localStorage quota exceeded — photos are the usual culprit
    console.error("Storage error:", err);
    if(err.name === "QuotaExceededError" || /quota/i.test(err.message)){
      toast("Storage full — try deleting old records or reducing photos", "fail");
    } else {
      toast("Save failed: " + err.message, "fail");
    }
    return;
  }

  // Reset transient state for the next record
  currentPhotos = [];
  currentSelectedStandards = [];

  updateHistoryBadge();
  if(activeTab === "history") renderHistory();

  const toastClass = status === "PASS" ? "pass" : status === "QUARANTINE" ? "quar" : "fail";
  toast(`${status} • ${item.name}`, toastClass);
  closeSheet();
}

function prefillFromLast(){
  if(!selectedItemId) return;
  const records = loadRecords().filter(r => r.itemId === selectedItemId);
  if(!records.length){ toast("No previous record for this item.", "info"); return; }
  const last = records[0];
  const set = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ""; };
  // Inspection record
  set("inspectorName", last.inspectorName);
  set("contactPerson", last.contactPerson);
  set("siteName", last.siteName);
  set("location", last.location);
  set("assetId", last.assetId);
  set("reportNumber", last.reportNumber);
  set("inspDate", last.inspDate);
  set("workOrder", last.workOrder);
  // Item details
  set("tare", last.tare);
  set("nett", last.nett);
  set("gross", last.gross);
  set("wll", last.wll);
  set("manufacturer", last.manufacturer);
  set("manufacturerSerial", last.manufacturerSerial);
  // Previous reports
  set("proofLoadRef", last.proofLoadRef);
  set("proofLoadDate", last.proofLoadDate);
  set("ndtRef", last.ndtRef);
  set("ndtDate", last.ndtDate);
  set("ccleRef", last.ccleRef);
  set("ccleDate", last.ccleDate);
  // Notes (but NOT photos — those are specific to each inspection)
  set("notes", last.notes);
  // Standards selection — restore if available
  if(Array.isArray(last.selectedStandards) && last.selectedStandards.length){
    currentSelectedStandards = [...last.selectedStandards];
    renderStandardSelector();
  }
  toast("Prefilled from last inspection", "info");
}

  // Render statistics dashboard
  const statsRow = document.getElementById("statsRow");
  if(statsRow){
    const stats = {
      total: allRecords.length,
      pass: allRecords.filter(r => r.status === "PASS").length,
      quar: allRecords.filter(r => r.status === "QUARANTINE").length,
      fail: allRecords.filter(r => r.status === "FAIL").length,
    };
    statsRow.innerHTML = `
      <div class="statBox"><div class="statNum">${stats.total}</div><div class="statLabel">Total</div></div>
      <div class="statBox passColor"><div class="statNum">${stats.pass}</div><div class="statLabel">Pass</div></div>
      <div class="statBox quarColor"><div class="statNum">${stats.quar}</div><div class="statLabel">Quar</div></div>
      <div class="statBox failColor"><div class="statNum">${stats.fail}</div><div class="statLabel">Fail</div></div>
    `;
  }

  // Apply search filter (uses the same #q input as Visual/NDT tabs)
  const q = (document.getElementById("q")?.value || "").trim().toLowerCase();
  let records = allRecords;
  if(q){
    records = allRecords.filter(r => {
      const hay = [
        r.itemName, r.category, r.siteName, r.location, r.assetId,
        r.reportNumber, r.workOrder, r.inspectorName, r.contactPerson,
        r.manufacturer, r.manufacturerSerial, r.notes, r.status,
        (r.selectedStandardCodes || []).join(" "),
      ].filter(Boolean).join(" ").toLowerCase();
      return hay.includes(q);
    });
  }

  const countText = q
    ? `${records.length} of ${allRecords.length} record${allRecords.length===1?"":"s"}`
    : `${allRecords.length} record${allRecords.length===1?"":"s"}`;
  document.getElementById("historyCount").textContent = countText;
  list.innerHTML = "";

  if(!records.length){
    list.innerHTML = q ? `

        <p>No records match "${escapeHtml(q)}".</p>

      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>No inspections yet.</p>
        <p style="margin-top:8px;font-size:12px">Open the Visual or NDT tab → tap an item → record PASS / QUARANTINE / FAIL.</p>
      </div>`;
    return;
  }

  for(const r of records){
    const div = document.createElement("div");
    div.className = "historyItem";
    div.tabIndex = 0;
    const cls = statusClass(r.status);
    const subtitle = [r.siteName, r.assetId].filter(Boolean).join(" • ") || "No site/asset details";
    div.innerHTML = `
      <div class="top">
        <div style="min-width:0;flex:1">
          <div class="name">${r.itemName}${r.importedFrom ? ` <span class="importedBadge" style="margin-left:4px;font-size:9px;padding:2px 6px;">FROM ${escapeHtml(r.importedFrom).toUpperCase()}</span>` : ""}</div>
          <div class="meta">${subtitle}</div>
          <div class="meta" style="margin-top:1px">${fmtLocal(r.createdAt)}</div>
        </div>
        <span class="statusPill ${cls}">${r.status}</span>
      </div>
      ${r.notes ? `<div class="preview">${(r.notes || "").slice(0,140)}${(r.notes||"").length>140?"…":""}</div>` : ""}
    `;
    div.addEventListener("click", () => showRecord(r.id));
    div.addEventListener("keydown", (e) => { if(e.key === "Enter") showRecord(r.id); });
    list.appendChild(div);
  }
}

/* ============================================================
   CSV Export
============================================================ */
function exportCSV(){
  const records = loadRecords();
  if(!records.length){ toast("No records to export", "info"); return; }
  const headers = ["createdAt","status","itemName","category","inspectorName","siteName","assetId","location","inspDate","workOrder","notes","primaryStandards","relatedStandards"];
  const lines = [headers.join(",")];
  for(const r of records){
    lines.push([
      r.createdAt, r.status, r.itemName, r.category, r.inspectorName,
      r.siteName, r.assetId, r.location, r.inspDate, r.workOrder, r.notes,
      (r.primaryStandards || []).join("; "),
      (r.relatedStandards || []).join("; ")
    ].map(escapeCSV).join(","));
  }
  const csv = lines.join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `scotia_inspections_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast(`Exported ${records.length} record${records.length===1?"":"s"}`, "pass");
}

/* ============================================================
   XLSX Export — placeholder-based template fill (preserves all styling)
   
   The embedded template (cvi_polished.xlsx) is a fully-styled Scotia CVI
   report with placeholder strings like {{REPORT_NUMBER}}, {{CLIENT}}, etc.
   in the user-fillable cells. At export time we:
     1. Load the template as a zip (JSZip)
     2. Find-replace placeholders in xl/worksheets/sheet1.xml with real values
     3. Embed photos as new images anchored in xl/drawings/drawing1.xml
     4. Re-zip and download
   
   This approach preserves ALL formatting — borders, fills, fonts, the
   Scotia logo on every page, the NATA accreditation logo — because
   we never let SheetJS read & rewrite the workbook (which strips images).
============================================================ */

function getTemplateArrayBuffer(record){
  // Pick template based on record kind / item
  let b64;
  if(record && record.kind === "ndt" && record.itemId === "ndt_et"){
    b64 = window.__EC_TEMPLATE_B64;
  } else if(record && record.kind === "ndt"){
    b64 = window.__NDT_TEMPLATE_B64;
  } else {
    b64 = window.__CVI_TEMPLATE_B64;
  }
  if(!b64) throw new Error("Template not embedded");
  const bin = atob(b64);
  const len = bin.length;
  const buf = new ArrayBuffer(len);
  const view = new Uint8Array(buf);
  for(let i = 0; i < len; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

// Escape a value to be safe inside an XML text node
function xmlEscape(s){
  if(s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Format a date input value (YYYY-MM-DD) as DD/MM/YYYY for AU display
function formatDateAU(dateStr){
  if(!dateStr) return "";
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(dateStr);
  if(m) return `${m[3]}/${m[2]}/${m[1]}`;
  return dateStr;
}

// Build replacement map from a record
function buildReplacements(r){
  const inspDateAU = formatDateAU(r.inspDate || (r.createdAt ? r.createdAt.slice(0,10) : ""));
  
  // Item description: name + category + description
  const itemDesc = [r.itemName, r.category, r.description].filter(Boolean).join(" — ");
  
  // Test Standard: inspector's selection (preferred) or item-type primaries
  const selectedCodes = (r.selectedStandardCodes && r.selectedStandardCodes.length)
    ? r.selectedStandardCodes
    : (r.selectedStandards && r.selectedStandards.length)
      ? r.selectedStandards.map(sid => STANDARD_BY_ID[sid]?.code || sid)
      : null;
  const testStandard = selectedCodes
    ? selectedCodes.join(", ")
    : (r.primaryStandards && r.primaryStandards.length)
      ? r.primaryStandards.join(", ")
      : "";
  
  // Inspection Results: status-based text + reason + photo captions
  let resultsText;
  if(r.status === "PASS"){
    resultsText = r.notes
      ? `Pass.\n\n${r.notes}`
      : "Pass.\nNote: No visible defects found at the time of inspection.";
  } else if(r.status === "QUARANTINE"){
    const reasonLine = r.statusReason ? `Reason: ${r.statusReason}\n\n` : "";
    resultsText = `Quarantine.\n\n${reasonLine}${r.notes || "Item placed in quarantine pending further assessment."}`;
  } else if(r.status === "FAIL"){
    const reasonLine = r.statusReason ? `Reason: ${r.statusReason}\n\n` : "";
    resultsText = `Fail.\n\n${reasonLine}${r.notes || "Item failed inspection. See attached photos for details."}`;
  } else {
    resultsText = r.notes || "";
  }
  // Append photo captions if any
  const normPhotos = normalizePhotos(r.photos);
  const captionedPhotos = normPhotos.filter(p => p.caption && p.caption.trim());
  if(captionedPhotos.length){
    resultsText += "\n\nPhoto notes:";
    normPhotos.forEach((p, i) => {
      if(p.caption && p.caption.trim()){
        resultsText += `\nPhoto ${i + 1}: ${p.caption.trim()}`;
      }
    });
  }
  
  return {
    "{{REPORT_NUMBER}}":       r.reportNumber || r.assetId || (r.id ? r.id.slice(0,8).toUpperCase() : ""),
    "{{SERIAL_NUMBER}}":       r.assetId || "",
    "{{PART_NUMBER}}":         r.assetId || "",
    "{{CLIENT}}":              r.siteName || "",
    "{{WORK_LOCATION}}":       r.location || "",
    "{{CONTACT_PERSON}}":      r.contactPerson || r.inspectorName || "",
    "{{JOB_NUMBER}}":          r.workOrder || "",
    "{{INSPECTION_DATE}}":     inspDateAU,
    "{{ITEM_DESCRIPTION}}":    itemDesc,
    "{{METHOD}}":              r.itemName || "",
    "{{TARE}}":                r.tare || "",
    "{{NETT}}":                r.nett || "",
    "{{GROSS}}":               r.gross || "",
    "{{WLL}}":                 r.wll || "NA",
    "{{MANUFACTURER}}":        r.manufacturer || "",
    "{{MANUFACTURER_SERIAL}}": r.manufacturerSerial || "",
    "{{TEST_STANDARD}}":       testStandard,
    "{{PROOF_LOAD_REF}}":      r.proofLoadRef || "",
    "{{PROOF_LOAD_DATE}}":     formatDateAU(r.proofLoadDate),
    "{{NDT_REF}}":             r.ndtRef || "",
    "{{NDT_DATE}}":            formatDateAU(r.ndtDate),
    "{{CCLE_REF}}":            r.ccleRef || "",

// Fill placeholders in worksheet XML
function fillPlaceholders(sheetXml, replacements){
  let xml = sheetXml;
  for(const [placeholder, value] of Object.entries(replacements)){
    const escaped = xmlEscape(value);
    // Use split/join (faster + no regex special-char issues)
    xml = xml.split(placeholder).join(escaped);
  }
  return xml;
}

function dataURLToBytes(dataURL){
  const m = /^data:image\/([a-zA-Z]+);base64,(.+)$/.exec(dataURL);
  if(!m) return null;
  let ext = m[1].toLowerCase();
  if(ext === "jpg") ext = "jpeg";
  const bin = atob(m[2]);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for(let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return { ext, bytes };
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ============================================================
   Share record between inspectors — JSON file export/import
   The recipient gets a .scotia.json file (via Teams, email, AirDrop,
   USB, etc), opens this app, taps Import, and the record lands in
   their History tagged with the original inspector's name.
============================================================ */
function shareRecord(recordId){
  const records = loadRecords();
  const r = records.find(x => x.id === recordId);
  if(!r){ toast("Record not found", "fail"); return; }

  const me = getCurrentUser();
  const payload = {
    _format: "scotia-cvi-record",
    _version: 1,
    _exportedBy: me?.name || r.inspectorName || "Unknown",
    _exportedAt: new Date().toISOString(),
    record: r,
  };

  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const safe = (r.assetId || r.itemName || "record").replace(/[^a-z0-9_-]/gi, "_").slice(0, 40);
  const dateStamp = (r.inspDate || (r.createdAt || "").slice(0,10)).replace(/[^0-9-]/g, "");
  downloadBlob(blob, `Scotia_record_${safe}_${dateStamp}.scotia.json`);
  toast("Record file saved — share it with another inspector", "pass");
}

async function importRecordFromFile(file){
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || data._format !== "scotia-cvi-record" || !data.record){
      throw new Error("Not a valid Scotia record file");
    }
    const r = data.record;
    if(!r.id){
      throw new Error("Record file is missing required fields");
    }

    // Check for duplicates by originalId or asset+date
    const records = loadRecords();
    const dup = records.find(x =>
      x.originalId === r.id ||
      (x.assetId && r.assetId && x.assetId === r.assetId && x.inspDate === r.inspDate)
    );

    const doImport = () => {
      const newId = (crypto?.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
      const imported = {
        ...r,
        id: newId,
        originalId: r.id,
        importedFrom: data._exportedBy || r.inspectorName || "Unknown",
        importedAt: new Date().toISOString(),
      };
      const all = loadRecords();
      all.unshift(imported);
      try {
        saveRecords(all);
      } catch(e){
        if(/quota/i.test(e.message)){
          toast("Storage full — delete old records to make room", "fail");
        } else {
          toast("Import failed: " + e.message, "fail");
        }
        return;
      }
      updateHistoryBadge();
      if(typeof renderHistory === "function") renderHistory();
      toast(`Imported from ${imported.importedFrom}`, "pass");
    };

    if(dup){
      showConfirm("Looks like a duplicate",
        `A record with the same asset and date already exists in your history. Import anyway?`,
        doImport);
    } else {
      doImport();
    }
  } catch(err){
    console.error(err);
    toast("Import failed: " + err.message, "fail");
  }
}

function pickRecordFileForImport(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,.scotia.json,application/json";
  input.addEventListener("change", (e) => {
    const file = e.target.files?.[0];
    if(file) importRecordFromFile(file);
  });
  input.click();
}
