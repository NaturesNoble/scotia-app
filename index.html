<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Scotia • AU Lifting Standards Quick Guide</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scotia Guide">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  :root {
    --bg:#0b1220;
    --bg-elev:#0e1730;
    --card:#121b2f;
    --card-2:#16213a;
    --muted:#93a4c7;
    --muted-2:#6f7fa3;
    --text:#e8eefc;
    --accent:#6aa7ff;
    --accent-strong:#3b82f6;
    --good:#4ade80;
    --warn:#fbbf24;
    --bad:#fb7185;
    --line:#243155;
    --line-2:#2e3d65;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== App shell ===== */
  .app {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ===== Auth overlay ===== */
  .authView {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: linear-gradient(180deg, #0b1220 0%, #1a253d 100%);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .authView.open { display: flex; }
  .authCard {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 18px;
    padding: 32px 24px 24px;
    box-shadow: 0 24px 60px rgba(0,0,0,.4);
    text-align: center;
  }
  .authBrand {
    font-family: "Franklin Gothic Demi", "Arial Black", system-ui, sans-serif;
    font-weight: 900;
    font-size: 38px;
    color: #376092;
    letter-spacing: 2px;
    line-height: 1;
    font-style: italic;
  }
  .authBrandO {
    display: inline-block;
    border: 3px solid #376092;
    border-radius: 50%;
    width: 0.8em;
    height: 0.8em;
    line-height: 0.7em;
    font-size: 0.85em;
    font-style: normal;
    margin: 0 1px;
  }
  .authBrandSub {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
    margin-top: 4px;
    margin-bottom: 24px;
  }
  .authTitle {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a22;
    margin: 0 0 6px;
  }
  .authSubtitle {
    font-size: 13px;
    color: #666;
    margin: 0 0 22px;
    line-height: 1.5;
  }
  .authContent { text-align: left; }
  .authContent .field {
    margin-bottom: 14px;
  }
  .authContent label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
  }
  .authContent input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border: 1.5px solid #d0d0d8;
    border-radius: 10px;
    background: #fff;
    font-size: 16px;
    color: #1a1a22;
    font-family: inherit;
  }
  .authContent input:focus {
    outline: none;
    border-color: #376092;
    box-shadow: 0 0 0 3px rgba(55, 96, 146, 0.15);
  }
  .authContent input[type="password"] {
    letter-spacing: 6px;
    font-size: 22px;
    text-align: center;
  }
  .authPrimaryBtn, .authSecondaryBtn {
    width: 100%;
    box-sizing: border-box;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    margin-top: 8px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .authPrimaryBtn {
    background: #376092;
    color: #fff;
  }
  .authPrimaryBtn:hover { background: #2c4f78; }
  .authPrimaryBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  .authSecondaryBtn {
    background: transparent;
    color: #376092;
    border: 1.5px solid #d0d0d8;
  }
  .authSecondaryBtn:hover { border-color: #376092; }
  .authError {
    color: #c83a3a;
    font-size: 13px;
    margin: 8px 0 4px;
    font-weight: 600;
    min-height: 18px;
  }
  .authFootNote {
    font-size: 11px;
    color: #999;
    margin-top: 20px;
    line-height: 1.5;
    text-align: center;
  }
  .authLink {
    background: none;
    border: none;
    color: #376092;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
    font-family: inherit;
    margin-top: 8px;
    display: inline-block;
  }
  .profileList {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 4px;
  }
  .profileBtn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 12px;
    background: #f4f4f6;
    border: 1.5px solid #e0e0e8;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s, border-color .12s;
  }
  .profileBtn:hover { background: #ecedf2; border-color: #376092; }
  .profileAvatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #376092;
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 15px;
    flex: 0 0 auto;
  }
  .profileBtnName {
    flex: 1;
    font-weight: 700;
    color: #1a1a22;
    font-size: 14px;
  }
  .profileBtnArrow {
    color: #888;
    width: 16px;
    height: 16px;
  }

  /* User pill in header */
  .userPill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    cursor: pointer;
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s;
  }
  .userPill:hover { background: rgba(255,255,255,.14); }
  .userPillAvatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #376092;
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 11px;
    flex: 0 0 auto;
  }
  .userPillName {
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .userPillChevron {
    width: 12px;
    height: 12px;
    opacity: 0.6;
  }

  /* User menu popover */
  .userMenu {
    position: fixed;
    top: 60px;
    right: 14px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
    min-width: 220px;
    z-index: 250;
    display: none;
    overflow: hidden;
  }
  .userMenu.open { display: block; }
  .userMenuHeader {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  .userMenuHeader .name { font-weight: 700; color: var(--text); }
  .userMenuHeader .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .userMenuItem {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 14px;
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .userMenuItem:hover { background: var(--card); }
  .userMenuItem svg { width: 16px; height: 16px; opacity: 0.7; }
  .userMenuItem.danger { color: var(--bad); }
  .userMenuItem.danger svg { opacity: 0.8; }
  .userMenuDivider { border-top: 1px solid var(--line); margin: 4px 0; }

  /* ===== Header ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: rgba(11,18,32,.94);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: calc(var(--safe-top) + 12px) 14px 10px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }

  .headRow {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logoBox {
    height: 38px;
    padding: 3px 8px;
    border-radius: 8px;
    background: #ffffff;
    display: grid; place-items: center;
    flex: 0 0 auto;
    overflow: hidden;
  }
  .logoBox img { height: 32px; width: auto; display: block; }
  .logoBox svg { width: 38px; height: 38px; }
  .brandTitle { min-width: 0; flex: 1; }
  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .2px;
    line-height: 1.2;
  }
  .brandMeta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .offlineDot {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(74,222,128,.08);
    color: var(--good);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .3px;
    text-transform: uppercase;
  }
  .offlineDot::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 8px rgba(74,222,128,.6);
  }

  /* Search row */
  .searchRow {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .searchWrap {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .searchWrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--muted-2);
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    padding: 13px 40px 13px 40px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    outline: none;
    font-size: 15px;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="search"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(106,167,255,.15);
  }
  input[type="search"]::-webkit-search-cancel-button { display: none; }
  .clearInline {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.06);
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .clearInline.show { display: flex; }
  .clearInline svg { width: 12px; height: 12px; }

  .iconBtn {
    width: 46px;
    height: 46px;
    flex: 0 0 auto;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--text);
    display: grid;
    place-items: center;
    cursor: pointer;
    padding: 0;
  }
  .iconBtn svg { width: 18px; height: 18px; }
  .iconBtn:active { background: var(--card-2); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 4px;
  }
  .tabs button {
    flex: 1;
    padding: 9px 10px;
    border-radius: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tabs button.active {
    background: var(--accent-strong);
    color: white;
    box-shadow: 0 2px 6px rgba(59,130,246,.3);
  }
  .tabs button .badge {
    background: rgba(255,255,255,.2);
    color: white;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 700;
  }
  .tabs button:not(.active) .badge {
    background: rgba(147,164,199,.18);
    color: var(--muted);
  }

  /* ===== Main ===== */
  main {
    flex: 1;
    padding: 14px 14px calc(80px + var(--safe-bottom));
  }

  .resultMeta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 12px;
  }
  .resultMeta .demoLink {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }

  /* Cards / list items */
  .list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card);
    cursor: pointer;
    transition: border-color .15s, transform .1s;
  }
  .item:active { transform: scale(.99); border-color: var(--accent); }
  .item .top {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .item .icon {
    width: 44px; height: 44px;
    flex: 0 0 auto;
    border-radius: 11px;
    border: 1px solid var(--line);
    background: rgba(106,167,255,.08);
    display: grid; place-items: center;
    color: var(--accent);
  }
  .item .icon svg { width: 28px; height: 28px; }
  .item .body { min-width: 0; flex: 1; }
  .item .name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1.3;
    color: var(--text);
  }
  .item .cat {
    color: var(--muted);
    font-size: 11px;
    margin-top: 2px;
  }

  /* Add custom item card */
  .item.addCustomItem {
    border: 1.5px dashed rgba(55, 96, 146, 0.45);
    background: linear-gradient(180deg, rgba(55, 96, 146, 0.06), rgba(55, 96, 146, 0.02));
  }
  .item.addCustomItem:hover {
    border-color: #376092;
    background: linear-gradient(180deg, rgba(55, 96, 146, 0.10), rgba(55, 96, 146, 0.04));
  }
  .item.addCustomItem .icon.addIcon {
    background: #376092;
    border-color: #1f3f66;
    color: #fff;
  }
  .item.addCustomItem .name { color: #376092; }

  /* Custom badge on item names */
  .customBadge {
    display: inline-block;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #376092;
    background: rgba(55, 96, 146, 0.12);
    border: 1px solid rgba(55, 96, 146, 0.3);
    padding: 2px 6px;
    border-radius: 4px;
    vertical-align: middle;
    margin-left: 4px;
  }
  .item .arrow {
    color: var(--muted-2);
    flex: 0 0 auto;
  }
  .item .arrow svg { width: 16px; height: 16px; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 9px;
    padding-left: 56px;
  }
  .chip {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(106,167,255,.1);
    color: var(--accent);
    border: 1px solid rgba(106,167,255,.2);
    font-weight: 600;
  }
  .chip.secondary {
    background: rgba(147,164,199,.08);
    color: var(--muted);
    border-color: var(--line);
  }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty svg { width: 40px; height: 40px; opacity: .4; margin-bottom: 10px; }
  .empty p { margin: 0; font-size: 13px; }
  .empty .hints { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .empty .hints button {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
  }

  /* ===== History items ===== */
  .historyItem {
    padding: 12px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: var(--card);
    cursor: pointer;
    transition: border-color .15s;
  }
  .historyItem:active { border-color: var(--accent); }
  .historyItem .top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .historyItem .name { font-weight: 700; font-size: 14px; }
  .historyItem .meta { color: var(--muted); font-size: 11px; margin-top: 3px; line-height: 1.4; }
  .historyItem .preview { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.4; }
  .statusPill {
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--line);
    font-weight: 700;
    letter-spacing: .4px;
    flex: 0 0 auto;
  }
  .status-pass { color: var(--good); border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.1); }
  .status-quarantine { color: var(--warn); border-color: rgba(251,191,36,.35); background: rgba(251,191,36,.1); }
  .status-fail { color: var(--bad); border-color: rgba(251,113,133,.35); background: rgba(251,113,133,.1); }

  /* ===== Sheet (details overlay) ===== */
  .sheet {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    visibility: hidden;
  }
  .sheet.open { pointer-events: auto; visibility: visible; }
  .sheetBackdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.6);
    opacity: 0;
    transition: opacity .25s ease;
  }
  .sheet.open .sheetBackdrop { opacity: 1; }
  .sheetPanel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 92dvh;
    background: var(--bg);
    border-top: 1px solid var(--line);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    box-shadow: 0 -10px 40px rgba(0,0,0,.5);
  }
  .sheet.open .sheetPanel { transform: translateY(0); }
  .sheetHandle {
    width: 40px;
    height: 4px;
    background: var(--line-2);
    border-radius: 999px;
    margin: 8px auto 0;
    flex: 0 0 auto;
  }
  .sheetHeader {
    padding: 10px 16px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 0 0 auto;
  }
  .sheetHeader .icon {
    width: 44px; height: 44px;
    flex: 0 0 auto;
    border-radius: 11px;
    border: 1px solid var(--line);
    background: rgba(106,167,255,.08);
    display: grid; place-items: center;
    color: var(--accent);
  }
  .sheetHeader .icon svg { width: 28px; height: 28px; }
  .sheetHeader .titleBlock { flex: 1; min-width: 0; }
  .sheetHeader .title { font-size: 16px; font-weight: 800; line-height: 1.25; }
  .sheetHeader .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sheetClose {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    padding: 0;
  }
  .sheetClose svg { width: 16px; height: 16px; }

  .sheetBody {
    overflow-y: auto;
    padding: 14px 16px calc(20px + var(--safe-bottom));
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }
  .sheetBody.withFooter { padding-bottom: calc(110px + var(--safe-bottom)); }

  .sheetFooter {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--bg) 60%, rgba(11,18,32,0));
    padding: 14px 16px calc(14px + var(--safe-bottom));
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .sheetFooter button {
    padding: 13px 8px;
    border-radius: 11px;
    border: 1px solid var(--line);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: .3px;
  }
  .sheetFooter .btnPass { background: rgba(74,222,128,.15); border-color: rgba(74,222,128,.4); color: var(--good); }
  .sheetFooter .btnQuar { background: rgba(251,191,36,.15); border-color: rgba(251,191,36,.4); color: var(--warn); }
  .sheetFooter .btnFail { background: rgba(251,113,133,.15); border-color: rgba(251,113,133,.4); color: var(--bad); }
  .sheetFooter button:active { transform: scale(.97); }

  /* Sheet content sections */
  .desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
    margin: 0 0 16px;
  }
  .sectionHead {
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin: 18px 0 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sectionHead:first-child { margin-top: 0; }

  .stdCard {
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    margin-bottom: 8px;
  }
  .stdCard .stdTop {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .stdCard .stdCode { font-weight: 800; font-size: 13px; }
  .stdCard .stdTitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stdCard .stdNote { font-size: 12px; color: var(--text); margin-top: 8px; line-height: 1.5; }
  .stdCard .stdSummary {
    font-size: 11px;
    color: var(--muted-2);
    margin-top: 6px;
    line-height: 1.5;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
  }
  .tag {
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 5px;
    border: 1px solid var(--line);
    color: var(--muted);
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 0 0 auto;
  }
  .tag.primary { color: var(--good); border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.08); }
  .tag.related { color: var(--accent); border-color: rgba(106,167,255,.35); background: rgba(106,167,255,.08); }

  .promptList {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .promptList li {
    padding: 10px 12px 10px 36px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--line);
    margin-bottom: 6px;
    font-size: 13px;
    line-height: 1.45;
    position: relative;
  }
  .promptList li::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 14px;
    width: 14px; height: 14px;
    border: 1.5px solid var(--accent);
    border-radius: 4px;
  }

  /* Inspection form */
  .formGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  input[type="text"], input[type="date"], textarea {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    outline: none;
    font-size: 14px;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="date"] { color-scheme: dark; }
  textarea { min-height: 80px; resize: vertical; }
  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(106,167,255,.15);
  }

  .prefillBtn {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 9px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .prefillBtn svg { width: 14px; height: 14px; }

  /* Photo grid */
  .photoGrid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 6px;
  }
  @media (min-width: 480px){
    .photoGrid { grid-template-columns: repeat(4, 1fr); }
  }
  .photoThumb {
    position: relative;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--card);
  }
  .photoThumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photoRemove {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(0,0,0,.7);
    border: none;
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .photoRemove:hover { background: rgba(0,0,0,.85); }
  .photoRemove svg { width: 14px; height: 14px; }
  .photoIdx {
    position: absolute;
    bottom: 4px;
    left: 4px;
    background: rgba(0,0,0,.65);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.2;
  }

  /* Standards chip selector */
  .stdChipGrid {
    margin-top: 6px;
  }
  .stdChipGroup {
    margin-top: 8px;
  }
  .stdChipGroup:first-child { margin-top: 0; }
  .stdChipGroupLabel {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted-2);
    margin-bottom: 6px;
  }
  .stdChipRow {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .stdChip {
    font-size: 12px;
    font-weight: 600;
    padding: 7px 11px;
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--line);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .12s, border-color .12s, color .12s, transform .08s;
    min-height: 36px;
  }
  .stdChip:active { transform: scale(.96); }
  .stdChip.suggested {
    border-color: rgba(55, 96, 146, 0.45);
    background: rgba(55, 96, 146, 0.07);
  }
  .stdChip.selected {
    background: #376092;
    color: #fff;
    border-color: #1f3f66;
  }
  .stdChip.selected.suggested {
    background: #376092;
    color: #fff;
    border-color: #1f3f66;
  }

  .synonyms {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .synonym {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,.04);
    color: var(--muted);
    border: 1px solid var(--line);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  /* Toast */
  /* Camera capture modal */
  .cameraModal {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 200;
    display: none;
    flex-direction: column;
  }
  .cameraModal.open {
    display: flex;
  }
  .cameraVideo {
    flex: 1;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    min-height: 0;
  }
  .cameraTopBar {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    z-index: 2;
    pointer-events: none;
  }
  .cameraTopBar > button { pointer-events: auto; }
  .cameraCloseBtn, .cameraSwitchBtn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: none;
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    -webkit-tap-highlight-color: transparent;
  }
  .cameraCloseBtn svg, .cameraSwitchBtn svg { width: 22px; height: 22px; }
  .cameraControls {
    padding: 24px 20px calc(28px + env(safe-area-inset-bottom, 0px));
    background: rgba(0,0,0,.85);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .cameraShutterBtn {
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: rgba(255,255,255,.95);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .1s, background .1s;
  }
  .cameraShutterBtn:active {
    transform: scale(.92);
    background: #fff;
  }

  .toast {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--card-2);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 6px 20px rgba(0,0,0,.4);
    z-index: 100;
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: calc(100vw - 32px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.pass { border-color: rgba(74,222,128,.4); }
  .toast.quar { border-color: rgba(251,191,36,.4); }
  .toast.fail { border-color: rgba(251,113,133,.4); }
  .toast.info { border-color: rgba(106,167,255,.4); }
  .toast .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .toast.pass .dot { background: var(--good); }
  .toast.quar .dot { background: var(--warn); }
  .toast.fail .dot { background: var(--bad); }
  .toast.info .dot { background: var(--accent); }

  /* Export menu popover */
  .exportMenuWrap {
    position: relative;
  }
  .exportMenu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 220px;
    background: var(--card);
    border: 1px solid var(--line-2);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    padding: 6px;
    z-index: 40;
    display: none;
  }
  .exportMenu.show { display: block; }
  .exportMenu button {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .exportMenu button:hover, .exportMenu button:active {
    background: var(--bg-elev);
  }
  .exportMenu button svg {
    width: 16px; height: 16px;
    color: var(--accent);
    flex: 0 0 auto;
  }
  .exportMenu .menuLabel {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted-2);
    padding: 8px 12px 4px;
  }
  .exportMenu .menuDivider {
    height: 1px;
    background: var(--line);
    margin: 4px 6px;
  }

  /* Confirm dialog */
  .confirm {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,.6);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm.show { display: flex; }
  .confirmBox {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    max-width: 360px;
    width: 100%;
  }
  .confirmBox h3 { margin: 0 0 8px; font-size: 16px; }
  .confirmBox p { margin: 0 0 16px; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .confirmActions { display: flex; gap: 8px; }
  .confirmActions button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--text);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
  }
  .confirmActions button.danger {
    background: rgba(251,113,133,.15);
    border-color: rgba(251,113,133,.4);
    color: var(--bad);
  }

  /* Header actions row (export etc) */
  .headerActions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* Larger screens — split layout */
  @media (min-width: 900px) {
    main { padding: 20px; }
    .splitGrid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
      max-width: 1100px;
      margin: 0 auto;
    }
  }
</style>
</head>

const USERS_KEY = "scotia_users_v1";
const CURRENT_USER_KEY = "scotia_current_user_v1";

function loadUsers(){
  try { return JSON.parse(localStorage.getItem(USERS_KEY) || "[]"); }

}
function saveUsers(arr){
  localStorage.setItem(USERS_KEY, JSON.stringify(arr));
}
function getCurrentUserId(){
  return localStorage.getItem(CURRENT_USER_KEY) || null;
}
function getCurrentUser(){
  const id = getCurrentUserId();
  if(!id) return null;
  return loadUsers().find(u => u.id === id) || null;
}
function setCurrentUserId(id){
  if(id) localStorage.setItem(CURRENT_USER_KEY, id);
  else localStorage.removeItem(CURRENT_USER_KEY);
}

// SHA-256 hash of (pin + salt) using Web Crypto API
async function hashPin(pin, salt){
  const enc = new TextEncoder();
  const data = enc.encode(String(pin) + ":" + String(salt));
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}
function generateSalt(){
  // 16 bytes of randomness, hex-encoded
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function createUserProfile(name, pin){
  const trimmed = (name || "").trim();
  if(!trimmed) throw new Error("Name is required");
  if(!/^\d{4,6}$/.test(pin)) throw new Error("PIN must be 4–6 digits");
  const users = loadUsers();
  if(users.some(u => u.name.toLowerCase() === trimmed.toLowerCase())){
    throw new Error("That name is already in use on this device");
  }
  const salt = generateSalt();
  const pinHash = await hashPin(pin, salt);
  const id = (crypto?.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
  const user = { id, name: trimmed, salt, pinHash, createdAt: new Date().toISOString() };
  users.push(user);
  saveUsers(users);
  return user;
}

async function verifyPin(userId, pin){
  const user = loadUsers().find(u => u.id === userId);
  if(!user) return false;
  const hash = await hashPin(pin, user.salt);
  return hash === user.pinHash;
}

async function changeUserPin(userId, newPin){
  if(!/^\d{4,6}$/.test(newPin)) throw new Error("PIN must be 4–6 digits");
  const users = loadUsers();
  const u = users.find(x => x.id === userId);
  if(!u) throw new Error("User not found");
  u.salt = generateSalt();
  u.pinHash = await hashPin(newPin, u.salt);
  saveUsers(users);
}

function renameUser(userId, newName){
  const trimmed = (newName || "").trim();
  if(!trimmed) throw new Error("Name is required");
  const users = loadUsers();
  if(users.some(u => u.id !== userId && u.name.toLowerCase() === trimmed.toLowerCase())){
    throw new Error("That name is already in use");
  }
  const u = users.find(x => x.id === userId);
  if(!u) throw new Error("User not found");
  u.name = trimmed;
  saveUsers(users);
}

function deleteUserProfile(userId){
  // Remove user's data
  localStorage.removeItem(`scotia_user_${userId}_inspections_v1`);
  localStorage.removeItem(`scotia_user_${userId}_custom_items_v1`);
  // Remove from users list
  saveUsers(loadUsers().filter(u => u.id !== userId));
  // If they were currently signed in, sign out
  if(getCurrentUserId() === userId) setCurrentUserId(null);
}

function userInitials(name){
  return String(name || "?")
    .trim()
    .split(/\s+/)
    .slice(0, 2)
    .map(s => s[0]?.toUpperCase() || "")
    .join("") || "?";
}

// On first launch with this version: if old data exists under the pre-profile keys,
// migrate it into the user's bucket when they create their first profile.
function migrateLegacyDataIntoUser(userId){
  const legacyRecordsKey = "exodrill_ndt_inspections_v1";
  const legacyCustomKey = "scotia_custom_items_v1";
  const legacyRecords = localStorage.getItem(legacyRecordsKey);
  const legacyCustom = localStorage.getItem(legacyCustomKey);
  let migrated = 0;
  if(legacyRecords){
    localStorage.setItem(`scotia_user_${userId}_inspections_v1`, legacyRecords);
    localStorage.removeItem(legacyRecordsKey);
    try { migrated = JSON.parse(legacyRecords).length || 0; } catch {}
  }
  if(legacyCustom){
    localStorage.setItem(`scotia_user_${userId}_custom_items_v1`, legacyCustom);
    localStorage.removeItem(legacyCustomKey);
  }
  return migrated;
}

/* ============================================================
   Search
============================================================ */
function normalize(s){ return (s||"").toLowerCase().replace(/[^a-z0-9\/\s\-]/g," ").replace(/\s+/g," ").trim(); }
function scoreMatch(query,text){
  const q=normalize(query),t=normalize(text);
  if(!q)return 0;
  if(t===q)return 100;
  if(t.includes(q))return 70;
  const qt=q.split(" ").filter(Boolean);
  let h=0;
  for(const tok of qt){if(tok.length<2)continue;if(t.includes(tok))h+=1;}
  return Math.min(40,h*10)+(t.startsWith(q)?20:0);
}
function itemSearch(query){
  const q=normalize(query);
  if(!q)return ITEMS.map(i=>({type:"item",item:i,score:0}));
  const r=[];
  for(const item of ITEMS){
    let b=Math.max(scoreMatch(q,item.name),scoreMatch(q,item.description||""));
    for(const s of item.synonyms)b=Math.max(b,scoreMatch(q,s));
    for(const m of item.standards){
      const st=STANDARD_BY_ID[m.sid];
      if(st)b=Math.max(b,scoreMatch(q,st.code+" "+st.title));
    }
    if(b>0)r.push({type:"item",item,score:b});
  }
  r.sort((a,b)=>b.score-a.score||a.item.name.localeCompare(b.item.name));
  return r;
}
function standardsSearch(query){
  const q=normalize(query);
  if(!q)return [];
  const o=[];
  for(const st of STANDARDS){
    const s=Math.max(scoreMatch(q,st.code),scoreMatch(q,st.title),scoreMatch(q,(st.tags||[]).join(" ")),scoreMatch(q,st.summary));
    if(s>0)o.push({type:"standard",standard:st,score:s});
  }
  o.sort((a,b)=>b.score-a.score||a.standard.code.localeCompare(b.standard.code));
  return o;
}

function renderResults(list){
  const el = document.getElementById("results");
  el.innerHTML = "";

  // Always show the "Add custom item" card at the top (whether or not there are results)
  const addCard = document.createElement("div");
  addCard.className = "item addCustomItem";
  addCard.tabIndex = 0;
  addCard.innerHTML = `
    <div class="top">
      <div class="icon addIcon">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="24" y1="14" x2="24" y2="34"/><line x1="14" y1="24" x2="34" y2="24"/></svg>
      </div>
      <div class="body">
        <div class="name">Add custom item</div>
        <div class="cat">Create your own for one-off inspections</div>
      </div>
      <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  addCard.addEventListener("click", showCustomItemForm);
  addCard.addEventListener("keydown", (e) => { if(e.key === "Enter") showCustomItemForm(); });
  el.appendChild(addCard);

  if(!list.length){
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No matches found.</p>
      <div class="hints">
        <button onclick="setSearch('shackle')">shackle</button>
        <button onclick="setSearch('AS 4991')">AS 4991</button>
        <button onclick="setSearch('webbing sling')">webbing sling</button>
        <button onclick="setSearch('MEWP')">MEWP</button>
      </div>`;
    el.appendChild(empty);
    return;
  }

  for(const r of list){
    if(r.type === "item"){
      const item = r.item;
      const div = document.createElement("div");
      div.className = "item";
      div.tabIndex = 0;
      const kind = itemIconKind(item.id);
      const stdChips = item.standards.slice(0,3).map(m => {
        const st = STANDARD_BY_ID[m.sid];
        return `<span class="${m.rel==='primary'?'chip':'chip secondary'}">${st?st.code:m.sid}</span>`;
      }).join("");
      const more = item.standards.length > 3 ? `<span class="chip secondary">+${item.standards.length - 3}</span>` : "";
      const customBadge = item.isCustom ? `<span class="customBadge">CUSTOM</span>` : "";
      div.innerHTML = `
        <div class="top">
          <div class="icon">${iconSVG(kind)}</div>
          <div class="body">
            <div class="name">${escapeHtml(item.name)} ${customBadge}</div>
            <div class="cat">${escapeHtml(item.category)}</div>
          </div>
          <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
        <div class="chips">${stdChips}${more}</div>`;
      div.addEventListener("click", () => showItem(item));
      div.addEventListener("keydown", (e) => { if(e.key === "Enter") showItem(item); });
      el.appendChild(div);
    } else {
      const st = r.standard;
      const div = document.createElement("div");
      div.className = "item";
      div.tabIndex = 0;
      div.innerHTML = `
        <div class="top">
          <div class="icon">${iconSVG("standard")}</div>
          <div class="body">
            <div class="name">${st.code}</div>
            <div class="cat">${st.title}</div>
          </div>
          <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>

      div.addEventListener("click", () => showStandard(st));
      div.addEventListener("keydown", (e) => { if(e.key === "Enter") showStandard(st); });

    }

}

/* ============================================================
   Bottom sheet
============================================================ */
function openSheet(){
  const sheet = document.getElementById("sheet");
  sheet.classList.add("open");
  sheet.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}
function closeSheet(){
  const sheet = document.getElementById("sheet");
  sheet.classList.remove("open");
  sheet.setAttribute("aria-hidden", "true");
  document.body.style.overflow = "";
  selectedItemId = null;
  sheetMode = null;
}

/* ============================================================
   Photo handling
============================================================ */
// Resize an image file to keep storage manageable.
// Returns a Promise resolving to a data URL (JPEG).
function resizeImageFile(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Not an image"));
      img.onload = () => {
        let { width, height } = img;
        // Scale down if needed
        if(width > PHOTO_MAX_DIMENSION || height > PHOTO_MAX_DIMENSION){
          if(width > height){
            height = Math.round(height * (PHOTO_MAX_DIMENSION / width));
            width = PHOTO_MAX_DIMENSION;
          } else {
            width = Math.round(width * (PHOTO_MAX_DIMENSION / height));
            height = PHOTO_MAX_DIMENSION;
          }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        // Always export as JPEG for predictable sizing in xlsx
        resolve(canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelection(e){
  const input = e.target;
  const files = Array.from(input.files || []);
  if(!files.length) return;

  const remaining = MAX_PHOTOS - currentPhotos.length;
  if(remaining <= 0){
    toast(`Maximum ${MAX_PHOTOS} photos reached`, "info");
    input.value = "";
    return;
  }
  const toProcess = files.slice(0, remaining);
  if(files.length > remaining){
    toast(`Only adding ${remaining} more (max ${MAX_PHOTOS})`, "info");
  }

  for(const file of toProcess){
    try {
      const dataURL = await resizeImageFile(file);
      currentPhotos.push(dataURL);
    } catch(err){
      console.error("Photo error:", err);
      toast(`Skipped "${file.name}": ${err.message}`, "fail");
    }
  }
  input.value = "";  // allow re-selecting same file
  renderPhotoGrid();
}

function renderPhotoGrid(){
  const grid = document.getElementById("photoGrid");
  const countEl = document.getElementById("photoCount");
  if(!grid) return;
  if(countEl) countEl.textContent = currentPhotos.length;

  grid.innerHTML = currentPhotos.map((url, idx) => `
    <div class="photoThumb">
      <img src="${url}" alt="Photo ${idx + 1}"/>
      <button type="button" class="photoRemove" data-idx="${idx}" aria-label="Remove photo ${idx + 1}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="photoIdx">${idx + 1}</span>
    </div>
  `).join("");

  grid.querySelectorAll(".photoRemove").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.getAttribute("data-idx"), 10);
      currentPhotos.splice(idx, 1);
      renderPhotoGrid();
    });
  });
}

/* ============================================================
   In-browser camera capture (works on Surface Pro, laptops, phones)
   Uses getUserMedia which actually accesses the webcam, unlike the
   <input capture=""> attribute that desktop browsers ignore.
============================================================ */
let cameraStream = null;
let cameraFacing = "environment";  // try rear cam first on phones; ignored on laptops
let cameraDevices = [];
let cameraDeviceIdx = 0;

async function openCameraCapture(){
  if(currentPhotos.length >= MAX_PHOTOS){
    toast(`Already at ${MAX_PHOTOS} photos`, "info");
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast("Camera not supported in this browser", "fail");
    // Fall back to file picker with capture attribute
    document.getElementById("cameraInput").click();
    return;
  }

  try {
    // First try: rear-facing if available (phones); plain video constraint covers laptops
    let constraints;
    try {
      constraints = { video: { facingMode: { ideal: cameraFacing }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false };
      cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(facingErr){
      // facingMode unsupported (typical on laptops) — drop it
      constraints = { video: { width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false };
      cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    }

    // Enumerate cameras so we can show the switch button when there's >1
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      cameraDevices = devices.filter(d => d.kind === "videoinput");
    } catch(e){ cameraDevices = []; }

    const modal = document.getElementById("cameraModal");
    const video = document.getElementById("cameraVideo");
    const switchBtn = document.getElementById("cameraSwitchBtn");
    video.srcObject = cameraStream;
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    switchBtn.style.display = cameraDevices.length > 1 ? "grid" : "none";
    // Lock body scroll while camera is open
    document.body.style.overflow = "hidden";
  } catch(err){
    console.error("Camera access failed:", err);
    if(err.name === "NotAllowedError" || err.name === "PermissionDeniedError"){
      toast("Camera permission denied — check browser settings", "fail");
    } else if(err.name === "NotFoundError" || err.name === "DevicesNotFoundError"){
      toast("No camera found on this device", "fail");
    } else if(err.name === "NotReadableError"){
      toast("Camera is in use by another app", "fail");
    } else {
      toast("Camera unavailable — using file picker", "info");
      document.getElementById("cameraInput").click();
    }
  }
}

function closeCameraCapture(){
  if(cameraStream){
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const modal = document.getElementById("cameraModal");
  modal.classList.remove("open");
  modal.setAttribute("aria-hidden", "true");
  const video = document.getElementById("cameraVideo");
  video.srcObject = null;
  document.body.style.overflow = "";
}

async function switchCameraDevice(){
  if(!cameraDevices.length) return;
  cameraDeviceIdx = (cameraDeviceIdx + 1) % cameraDevices.length;
  const targetId = cameraDevices[cameraDeviceIdx].deviceId;
  // Stop current
  if(cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: targetId }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    document.getElementById("cameraVideo").srcObject = cameraStream;
  } catch(err){
    console.error(err);
    toast("Could not switch camera", "fail");
  }
}

function captureCameraPhoto(){
  const video = document.getElementById("cameraVideo");
  if(!video.videoWidth || !video.videoHeight){
    toast("Camera not ready — wait a moment", "info");
    return;
  }
  if(currentPhotos.length >= MAX_PHOTOS){
    toast(`Maximum ${MAX_PHOTOS} photos reached`, "info");
    closeCameraCapture();
    return;
  }

  // Draw current video frame to a canvas, scaled to fit PHOTO_MAX_DIMENSION
  let w = video.videoWidth;
  let h = video.videoHeight;
  if(w > PHOTO_MAX_DIMENSION || h > PHOTO_MAX_DIMENSION){
    if(w > h){
      h = Math.round(h * (PHOTO_MAX_DIMENSION / w));
      w = PHOTO_MAX_DIMENSION;
    } else {
      w = Math.round(w * (PHOTO_MAX_DIMENSION / h));
      h = PHOTO_MAX_DIMENSION;
    }
  }
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, w, h);
  const dataURL = canvas.toDataURL("image/jpeg", PHOTO_JPEG_QUALITY);

  currentPhotos.push(dataURL);
  renderPhotoGrid();
  toast(`Photo ${currentPhotos.length}/${MAX_PHOTOS} captured`, "pass");

  // If at the limit, close; otherwise stay open for the next shot
  if(currentPhotos.length >= MAX_PHOTOS){
    closeCameraCapture();
  }
}

// Wire camera modal buttons once on page load (not per-form-render)
document.addEventListener("DOMContentLoaded", () => {
  const close = document.getElementById("cameraCloseBtn");
  const shutter = document.getElementById("cameraShutterBtn");
  const switchBtn = document.getElementById("cameraSwitchBtn");
  if(close) close.addEventListener("click", closeCameraCapture);
  if(shutter) shutter.addEventListener("click", captureCameraPhoto);
  if(switchBtn) switchBtn.addEventListener("click", switchCameraDevice);
});

function renderStandardSelector(){
  const container = document.getElementById('standardSelector');
  if(!container) return;
  // Group: suggested (mapped to current item) first, then everything else
  const item = ITEM_BY_ID[selectedItemId];
  const itemStdIds = new Set((item?.standards || []).map(s => s.sid));

  const buildChip = (s) => {
    const selected = currentSelectedStandards.includes(s.id);
    const suggested = itemStdIds.has(s.id);
    return `<button type="button" class="stdChip ${selected ? "selected" : ""} ${suggested ? "suggested" : ""}" data-sid="${s.id}" title="${s.title}">${s.code}</button>`;
  };

  // Suggested standards (from the item) first, then the rest
  const suggested = STANDARDS.filter(s => itemStdIds.has(s.id));
  const others = STANDARDS.filter(s => !itemStdIds.has(s.id));

  let html = "";
  if(suggested.length){
    html += `<div class="stdChipGroup"><div class="stdChipGroupLabel">Suggested for this item</div><div class="stdChipRow">${suggested.map(buildChip).join("")}</div></div>`;
  }
  if(others.length){
    html += `<div class="stdChipGroup"><div class="stdChipGroupLabel">Other standards</div><div class="stdChipRow">${others.map(buildChip).join("")}</div></div>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.stdChip').forEach(btn => {
    btn.addEventListener('click', () => {
      const sid = btn.getAttribute('data-sid');
      const idx = currentSelectedStandards.indexOf(sid);
      if(idx >= 0){
        currentSelectedStandards.splice(idx, 1);
        btn.classList.remove('selected');
      } else {
        currentSelectedStandards.push(sid);
        btn.classList.add('selected');
      }
    });
  });
}

function saveCustomItem(){
  const name = (document.getElementById("ciName")?.value || "").trim();
  if(!name){ toast("Item name is required", "fail"); return; }

  const category = (document.getElementById("ciCategory")?.value || "Custom").trim() || "Custom";
  const description = (document.getElementById("ciDescription")?.value || "").trim();
  const synonymsRaw = (document.getElementById("ciSynonyms")?.value || "").trim();
  const synonyms = synonymsRaw ? synonymsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];
  const promptsRaw = (document.getElementById("ciPrompts")?.value || "").trim();
  const prompts = promptsRaw ? promptsRaw.split(/\r?\n/).map(s => s.trim()).filter(Boolean) : [];
  // Default-selected standards become "primary" mappings on the custom item
  const standards = currentSelectedStandards.map(sid => ({ sid, rel: "primary", note: "" }));

  const newItem = {
    id: "custom_" + (crypto?.randomUUID ? crypto.randomUUID().slice(0, 8) : Date.now().toString(36)),
    name,
    description,
    category,
    synonyms,
    standards,
    prompts,
    isCustom: true,
  };

  const existing = loadCustomItems();
  existing.push(newItem);
  saveCustomItems(existing);
  rebuildItems();

  currentSelectedStandards = [];  // reset for next use
  toast(`"${name}" added to your items`, "pass");
  closeSheet();

  // Re-render the items list so the new item shows immediately
  runSearch();
}

function saveInspection(status){
  if(!selectedItemId){ toast("Select an item first.", "info"); return; }
  const item = ITEM_BY_ID[selectedItemId];
  if(!item){ toast("Item not found.", "fail"); return; }

  const get = id => (document.getElementById(id)?.value || "").trim();
  const record = {
    id: (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2)),
    createdAt: nowISO(),
    status,
    itemId: item.id,
    itemName: item.name,
    category: item.category,
    description: item.description || "",
    // Inspection record
    inspectorName: get("inspectorName"),
    contactPerson: get("contactPerson"),
    siteName: get("siteName"),
    location: get("location"),
    assetId: get("assetId"),
    reportNumber: get("reportNumber"),
    inspDate: get("inspDate"),
    workOrder: get("workOrder"),
    // Item details
    tare: get("tare"),
    nett: get("nett"),
    gross: get("gross"),
    wll: get("wll"),
    manufacturer: get("manufacturer"),
    manufacturerSerial: get("manufacturerSerial"),
    // Previous reports
    proofLoadRef: get("proofLoadRef"),
    proofLoadDate: get("proofLoadDate"),
    ndtRef: get("ndtRef"),
    ndtDate: get("ndtDate"),
    ccleRef: get("ccleRef"),
    ccleDate: get("ccleDate"),
    // Notes + photos
    notes: get("notes"),
    photos: [...currentPhotos],
    // Standards: inspector's selection + item-type snapshot for context
    selectedStandards: [...currentSelectedStandards],  // array of standard IDs
    selectedStandardCodes: currentSelectedStandards.map(sid => STANDARD_BY_ID[sid]?.code || sid),
    primaryStandards: item.standards.filter(s => s.rel === "primary").map(s => STANDARD_BY_ID[s.sid]?.code || s.sid),
    relatedStandards: item.standards.filter(s => s.rel !== "primary").map(s => STANDARD_BY_ID[s.sid]?.code || s.sid),
  };

  const records = loadRecords();
  records.unshift(record);
  try {
    saveRecords(records);
  } catch(err){
    // localStorage quota exceeded — photos are the usual culprit
    console.error("Storage error:", err);
    if(err.name === "QuotaExceededError" || /quota/i.test(err.message)){
      toast("Storage full — try deleting old records or reducing photos", "fail");
    } else {
      toast("Save failed: " + err.message, "fail");
    }
    return;
  }

  // Reset transient state for the next record
  currentPhotos = [];
  currentSelectedStandards = [];

  updateHistoryBadge();
  if(activeTab === "history") renderHistory();

  const toastClass = status === "PASS" ? "pass" : status === "QUARANTINE" ? "quar" : "fail";
  toast(`${status} • ${item.name}`, toastClass);
  closeSheet();
}

============================================================ */
function exportCSV(){
  const records = loadRecords();
  if(!records.length){ toast("No records to export", "info"); return; }
  const headers = ["createdAt","status","itemName","category","inspectorName","siteName","assetId","location","inspDate","workOrder","notes","primaryStandards","relatedStandards"];
  const lines = [headers.join(",")];
  for(const r of records){
    lines.push([
      r.createdAt, r.status, r.itemName, r.category, r.inspectorName,
      r.siteName, r.assetId, r.location, r.inspDate, r.workOrder, r.notes,
      (r.primaryStandards || []).join("; "),
      (r.relatedStandards || []).join("; ")
    ].map(escapeCSV).join(","));
  }
  const csv = lines.join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `scotia_inspections_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast(`Exported ${records.length} record${records.length===1?"":"s"}`, "pass");
}

/* ============================================================
   XLSX Export — placeholder-based template fill (preserves all styling)
   
   The embedded template (cvi_polished.xlsx) is a fully-styled Scotia CVI
   report with placeholder strings like {{REPORT_NUMBER}}, {{CLIENT}}, etc.
   in the user-fillable cells. At export time we:
     1. Load the template as a zip (JSZip)
     2. Find-replace placeholders in xl/worksheets/sheet1.xml with real values
     3. Embed photos as new images anchored in xl/drawings/drawing1.xml
     4. Re-zip and download
   
   This approach preserves ALL formatting — borders, fills, fonts, the
   Scotia logo on every page, the NATA accreditation logo — because
   we never let SheetJS read & rewrite the workbook (which strips images).
============================================================ */

function getTemplateArrayBuffer(){
  const b64 = window.__CVI_TEMPLATE_B64;
  if(!b64) throw new Error("Template not embedded");
  const bin = atob(b64);
  const len = bin.length;
  const buf = new ArrayBuffer(len);
  const view = new Uint8Array(buf);
  for(let i = 0; i < len; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

// Escape a value to be safe inside an XML text node
function xmlEscape(s){
  if(s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Format a date input value (YYYY-MM-DD) as DD/MM/YYYY for AU display
function formatDateAU(dateStr){
  if(!dateStr) return "";
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(dateStr);
  if(m) return `${m[3]}/${m[2]}/${m[1]}`;
  return dateStr;
}

// Build replacement map from a record
function buildReplacements(r){
  const inspDateAU = formatDateAU(r.inspDate || (r.createdAt ? r.createdAt.slice(0,10) : ""));
  
  // Item description: name + category + description
  const itemDesc = [r.itemName, r.category, r.description].filter(Boolean).join(" — ");
  
  // Test Standard: inspector's selection (preferred) or item-type primaries
  const selectedCodes = (r.selectedStandardCodes && r.selectedStandardCodes.length)
    ? r.selectedStandardCodes
    : (r.selectedStandards && r.selectedStandards.length)
      ? r.selectedStandards.map(sid => STANDARD_BY_ID[sid]?.code || sid)
      : null;
  const testStandard = selectedCodes
    ? selectedCodes.join(", ")
    : (r.primaryStandards && r.primaryStandards.length)
      ? r.primaryStandards.join(", ")
      : "";
  
  // Inspection Results: status-based text
  let resultsText;
  if(r.status === "PASS"){
    resultsText = r.notes
      ? `Pass.\n\n${r.notes}`
      : "Pass.\nNote: No visible defects found at the time of inspection.";
  } else if(r.status === "QUARANTINE"){
    resultsText = `Quarantine.\n\n${r.notes || "Item placed in quarantine pending further assessment."}`;
  } else if(r.status === "FAIL"){
    resultsText = `Fail.\n\n${r.notes || "Item failed inspection. See attached photos for details."}`;
  } else {
    resultsText = r.notes || "";
  }
  
  return {
    "{{REPORT_NUMBER}}":       r.reportNumber || r.assetId || (r.id ? r.id.slice(0,8).toUpperCase() : ""),
    "{{SERIAL_NUMBER}}":       r.assetId || "",
    "{{CLIENT}}":              r.siteName || "",
    "{{WORK_LOCATION}}":       r.location || "",
    "{{CONTACT_PERSON}}":      r.contactPerson || r.inspectorName || "",
    "{{JOB_NUMBER}}":          r.workOrder || "",
    "{{INSPECTION_DATE}}":     inspDateAU,
    "{{ITEM_DESCRIPTION}}":    itemDesc,
    "{{TARE}}":                r.tare || "",
    "{{NETT}}":                r.nett || "",
    "{{GROSS}}":               r.gross || "",
    "{{WLL}}":                 r.wll || "NA",
    "{{MANUFACTURER}}":        r.manufacturer || "",
    "{{MANUFACTURER_SERIAL}}": r.manufacturerSerial || "",
    "{{TEST_STANDARD}}":       testStandard,
    "{{PROOF_LOAD_REF}}":      r.proofLoadRef || "",
    "{{PROOF_LOAD_DATE}}":     formatDateAU(r.proofLoadDate),
    "{{NDT_REF}}":             r.ndtRef || "",
    "{{NDT_DATE}}":            formatDateAU(r.ndtDate),
    "{{CCLE_REF}}":            r.ccleRef || "",
    "{{CCLE_DATE}}":           formatDateAU(r.ccleDate),
    "{{INSPECTION_RESULTS}}":  resultsText,
    "{{INSPECTOR}}":           r.inspectorName || "",
  };
}

// Fill placeholders in worksheet XML
function fillPlaceholders(sheetXml, replacements){
  let xml = sheetXml;
  for(const [placeholder, value] of Object.entries(replacements)){
    const escaped = xmlEscape(value);
    // Use split/join (faster + no regex special-char issues)
    xml = xml.split(placeholder).join(escaped);
  }
  return xml;
}

/* ============================================================
   Photo embedding (unchanged from previous version)
============================================================ */
function buildPhotoAnchor(rId, picId, fromCol, fromRow, toCol, toRow){
  return `<twoCellAnchor editAs="oneCell"><from><col>${fromCol}</col><colOff>50000</colOff><row>${fromRow}</row><rowOff>50000</rowOff></from><to><col>${toCol}</col><colOff>-50000</colOff><row>${toRow}</row><rowOff>-50000</rowOff></to><pic><nvPicPr><cNvPr id="${picId}" name="Photo ${picId}"/><cNvPicPr><a:picLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></cNvPicPr></nvPicPr><blipFill><a:blip xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" r:embed="${rId}"/><a:stretch xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:fillRect/></a:stretch></blipFill><spPr><a:prstGeom xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" prst="rect"><a:avLst/></a:prstGeom><a:ln xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:solidFill><a:srgbClr val="999999"/></a:solidFill></a:ln></spPr></pic><clientData/></twoCellAnchor>`;
}

// Photo grid for up to 8 photos on page 2 (rows 49-105). 0-indexed cell anchors.
const PHOTO_POSITIONS = [
  [1, 49, 5, 63],   [5, 49, 9, 63],   // photos 1, 2
  [1, 63, 5, 77],   [5, 63, 9, 77],   // photos 3, 4
  [1, 77, 5, 91],   [5, 77, 9, 91],   // photos 5, 6
  [1, 91, 5, 105],  [5, 91, 9, 105],  // photos 7, 8
];

function dataURLToBytes(dataURL){
  const m = /^data:image\/([a-zA-Z]+);base64,(.+)$/.exec(dataURL);
  if(!m) return null;
  let ext = m[1].toLowerCase();
  if(ext === "jpg") ext = "jpeg";
  const bin = atob(m[2]);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for(let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return { ext, bytes };
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ============================================================
   Main export — JSZip-based
============================================================ */
async function exportRecordXLSX(recordId){
  if(typeof JSZip === "undefined"){
    toast("Library not loaded — refresh and try again", "fail");
    return;
  }
  const records = loadRecords();
  const r = records.find(x => x.id === recordId);
  if(!r){ toast("Record not found", "fail"); return; }

  try {
    const buf = getTemplateArrayBuffer();
    const zip = await JSZip.loadAsync(buf);

    // 1. Fill placeholders in the worksheet XML
    const sheetPath = "xl/worksheets/sheet1.xml";
    const sheetFile = zip.file(sheetPath);
    if(!sheetFile) throw new Error("Template missing worksheet");
    let sheetXml = await sheetFile.async("string");
    const replacements = buildReplacements(r);
    sheetXml = fillPlaceholders(sheetXml, replacements);
    zip.file(sheetPath, sheetXml);

    // 2. Embed photos
    const photos = r.photos || [];
    if(photos.length){
      const drawingFile = zip.file("xl/drawings/drawing1.xml");
      const relsFile = zip.file("xl/drawings/_rels/drawing1.xml.rels");
      const ctFile = zip.file("[Content_Types].xml");
      if(drawingFile && relsFile && ctFile){
        let drawingXml = await drawingFile.async("string");
        let relsXml = await relsFile.async("string");
        let ctXml = await ctFile.async("string");

        // Find max rId / pic id
        let maxRid = 0;
        const ridRe = /Id="rId(\d+)"/g;
        let m;
        while((m = ridRe.exec(relsXml)) !== null){
          const n = parseInt(m[1], 10);
          if(n > maxRid) maxRid = n;
        }
        let maxPicId = 1000;
        const picIdRe = /<cNvPr\s+id="(\d+)"/g;
        while((m = picIdRe.exec(drawingXml)) !== null){
          const n = parseInt(m[1], 10);
          if(n > maxPicId) maxPicId = n;
        }

        // Ensure png/jpeg content types are registered
        const ensureExt = (ext, contentType) => {
          if(!ctXml.includes(`Extension="${ext}"`)){
            ctXml = ctXml.replace(/<\/Types>\s*$/, `<Default Extension="${ext}" ContentType="${contentType}"/></Types>`);
          }
        };

        const max = Math.min(photos.length, PHOTO_POSITIONS.length);
        let newAnchors = "";
        let newRels = "";
        for(let i = 0; i < max; i++){
          const parsed = dataURLToBytes(photos[i]);
          if(!parsed){ console.warn("Could not parse photo", i); continue; }
          const { ext, bytes } = parsed;
          const imageName = `photo${i + 1}.${ext}`;
          const imagePath = `xl/media/${imageName}`;
          zip.file(imagePath, bytes);
          ensureExt(ext, ext === "png" ? "image/png" : "image/jpeg");

          const rId = ++maxRid;
          const picId = ++maxPicId;
          const ridStr = `rId${rId}`;
          const [fc, fr, tc, tr] = PHOTO_POSITIONS[i];
          newAnchors += buildPhotoAnchor(ridStr, picId, fc, fr, tc, tr);
          newRels += `<Relationship Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="/${imagePath}" Id="${ridStr}"/>`;
        }

        drawingXml = drawingXml.replace(/<\/wsDr>\s*$/, newAnchors + "</wsDr>");
        relsXml = relsXml.replace(/<\/Relationships>\s*$/, newRels + "</Relationships>");

        zip.file("xl/drawings/drawing1.xml", drawingXml);
        zip.file("xl/drawings/_rels/drawing1.xml.rels", relsXml);
        zip.file("[Content_Types].xml", ctXml);
      }
    }

    // 3. Save
    const blob = await zip.generateAsync({
      type: "blob",
      mimeType: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
      compression: "DEFLATE",
    });

    const safe = (r.assetId || r.itemName || "record").replace(/[^a-z0-9_-]/gi, "_").slice(0, 40);
    const dateStamp = (r.inspDate || r.createdAt.slice(0,10)).replace(/[^0-9-]/g, "");
    downloadBlob(blob, `Scotia_CVI_${safe}_${dateStamp}.xlsx`);
    toast("Excel report exported", "pass");
  } catch(err){
    console.error(err);
    toast("Export failed: " + err.message, "fail");
  }
}

async function exportAllXLSX(){
  if(typeof JSZip === "undefined"){
    toast("Library not loaded — refresh and try again", "fail");
    return;
  }
  const records = loadRecords();
  if(!records.length){ toast("No records to export", "info"); return; }

  try {
    // Export each record as its own xlsx, staggered so the browser handles them
    for(let i = 0; i < records.length; i++){
      // Re-use exportRecordXLSX logic by calling it
      await exportRecordXLSX(records[i].id);
      // Brief pause between downloads
      if(i < records.length - 1){
        await new Promise(res => setTimeout(res, 400));
      }
    }
    toast(`Exported ${records.length} report${records.length===1?"":"s"}`, "pass");
  } catch(err){
    console.error(err);
    toast("Export failed: " + err.message, "fail");
  }
}

/* ============================================================

============================================================ */
function runSearch(){
  const q = document.getElementById("q").value;
  const items = itemSearch(q);
  const standards = standardsSearch(q);
  const combined = [...items, ...standards].sort((a,b) => b.score - a.score);
  document.getElementById("count").textContent = q
    ? `${combined.length} match${combined.length===1?"":"es"}`
    : `${ITEMS.length} items`;
  renderResults(combined.slice(0, 50));

  document.getElementById("clearBtn").classList.toggle("show", q.length > 0);
}

let pendingUserId = null;  // user being PIN-prompted

function showAuthView(){
  const v = document.getElementById("authView");
  if(v) v.classList.add("open");
  document.body.style.overflow = "hidden";
}
function hideAuthView(){

function renderAuthState(){
  const users = loadUsers();
  if(!users.length){
    renderSignupForm({ first: true });
  } else if(pendingUserId){
    const u = users.find(x => x.id === pendingUserId);
    if(u) renderPinEntry(u);
    else { pendingUserId = null; renderProfilePicker(users); }
  } else {
    renderProfilePicker(users);
  }
}

function setAuthHeader(title, subtitle){
  document.getElementById("authTitle").textContent = title;
  document.getElementById("authSubtitle").textContent = subtitle || "";

function renderSignupForm(opts){
  setAuthHeader(opts.first ? "Welcome to Scotia" : "Add inspector profile",
                opts.first ? "Create your inspector profile to get started." : "Add another inspector who shares this device.");
  const c = document.getElementById("authContent");
  c.innerHTML = `

      <label for="suName">Your name</label>
      <input id="suName" type="text" autocomplete="name" placeholder="e.g. John Smith" autofocus/>

    </div>
    <div class="field">
      <label for="suPinConfirm">Confirm PIN</label>
      <input id="suPinConfirm" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="new-password" placeholder="••••"/>
    </div>
    <div class="authError" id="suErr"></div>
    <button class="authPrimaryBtn" id="suCreate" type="button">Create profile</button>
    ${!opts.first ? `<button class="authSecondaryBtn" id="suBack" type="button">Back to sign in</button>` : ""}
    <div style="text-align:center;margin-top:8px;font-size:11px;color:#888;">
      Write down your PIN — if forgotten, the profile can be reset but records will be lost.
    </div>
  `;
  const showErr = (m) => document.getElementById("suErr").textContent = m;
  document.getElementById("suCreate").addEventListener("click", async () => {
    const name = document.getElementById("suName").value.trim();
    const pin = document.getElementById("suPin").value;
    const confirmPin = document.getElementById("suPinConfirm").value;
    showErr("");
    if(!name){ showErr("Name is required"); return; }
    if(!/^\d{4,6}$/.test(pin)){ showErr("PIN must be 4–6 digits"); return; }
    if(pin !== confirmPin){ showErr("PINs don't match"); return; }
    try {
      const user = await createUserProfile(name, pin);
      // First profile? Migrate any existing pre-profile data
      const migrated = loadUsers().length === 1 ? migrateLegacyDataIntoUser(user.id) : 0;
      setCurrentUserId(user.id);
      rebuildItems();
      enterApp();

      () => {
        deleteUserProfile(u.id);
        toast("Profile deleted", "info");
        renderAuthState();
        showAuthView();
      });
  });
});

// Page-load gate: show auth view if not signed in
(function initAuth(){
  const uid = getCurrentUserId();
  if(uid && loadUsers().find(u => u.id === uid)){
    // Already signed in — proceed
    rebuildItems();
    refreshUserPill();
  } else {
    // Not signed in — show auth view
    setCurrentUserId(null);
    renderAuthState();
    showAuthView();
  }
})();

// Initial render
runSearch();
updateHistoryBadge();
</script>

<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(console.error);
    });
  }
</script>
